; Alpakit build-target configuration for SMLWebSocket.
;
; SMLWebSocket is a server-side dependency of DiscordBridge (RequiredOnRemote=false).
; It must be packaged for every target that DiscordBridge supports:
;   Windows       – Windows listen-server hosts.
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).
;
; All three Alpakit targets are declared explicitly here so the packaged .zip
; includes binaries for every dedicated-server type Satisfactory supports.
; Without this file Alpakit defaults to all three targets anyway, but being
; explicit avoids any accidental omission when target defaults change.

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
