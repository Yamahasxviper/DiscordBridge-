[AccessTransformers]
; Allow FEOSSharedCompatModule to access private members of UFGLocalPlayer so
; that SUBSCRIBE_METHOD can directly patch UFGLocalPlayer::RequestPublicPlayerAddress.
; This suppresses the ipify.org HTTP request that the game fires unconditionally
; for the EOS service-account local player on dedicated servers.
Friend=(Class="UFGLocalPlayer", FriendClass="FEOSSharedCompatModule")
