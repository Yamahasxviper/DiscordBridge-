; Alpakit build-target configuration for CSSCompatStubs.
;
; CSSCompatStubs provides compile-time stubs for EOS-related modules that CSS
; custom UnrealEngine omits from its dedicated-server binaries. The stub modules
; all carry TargetDenyList:[Game] in CSSCompatStubs.uplugin, so they are only
; compiled for Server targets. This mod must be packaged for every server target
; that DiscordBridge supports so the stubs are available at build time.
;
; Windows is intentionally omitted: on Game targets the real CSS UE EOS modules
; are present and the stubs are not loaded (TargetDenyList prevents it). Alpakit
; still packages the mod for Windows with an empty module list, which is harmless.

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
