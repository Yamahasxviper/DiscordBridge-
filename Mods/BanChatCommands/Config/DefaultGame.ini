; BanChatCommands admin configuration.
;
; Add this section to your server's DefaultGame.ini (or to this file for mod-packaged defaults).
;
; Steam64 IDs — Each +AdminSteam64Ids= entry grants that Steam player permission to run
; /ban, /tempban, /unban, /bancheck, /banlist, /linkbans, /unlinkbans, and /playerhistory
; from in-game chat.
;
; EOS Product User IDs — Each +AdminEosPUIDs= entry grants that EOS player the same admin
; permissions.  EOS PUIDs are 32-character hex strings.  Players can find their own PUID
; by running /whoami in-game.
;
; If both lists are empty, those commands are only usable from the server console.
; /whoami is always available to all players regardless of this setting.
;
; Steam64 IDs are 17-digit decimal numbers (e.g. 76561198000000000).
; Use /whoami in-game or a site like steamid.io to find your Steam64.
;
; Example:
;   [/Script/BanChatCommands.BanChatCommandsConfig]
;   +AdminSteam64Ids=76561198000000000
;   +AdminSteam64Ids=76561198111111111
;   +AdminEosPUIDs=00020aed06f0a6958c3c067fb4b73d51

[/Script/BanChatCommands.BanChatCommandsConfig]
; +AdminSteam64Ids=YOUR_STEAM64_ID_HERE
; +AdminEosPUIDs=YOUR_EOS_PUID_HERE
