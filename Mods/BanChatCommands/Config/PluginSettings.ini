[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
# DefaultBanChatCommands.ini is user-editable runtime configuration (contains
# the admin EOS PUID list).  Excluding it from the package prevents mod updates
# from overwriting a server operator's configured file.  Override settings by
# placing your values in Saved/Config/<Platform>/BanChatCommands.ini instead.
+ExcludedNonUSFFiles=Config/DefaultBanChatCommands.ini
