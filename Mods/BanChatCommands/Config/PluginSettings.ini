[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
; DefaultBanChatCommands.ini is user-editable runtime configuration.
; Excluding it from the package prevents mod updates from overwriting a
; server operator's settings.  Override settings go in:
;   Saved/Config/<Platform>/BanChatCommands.ini
+ExcludedNonUSFFiles=Config/DefaultBanChatCommands.ini
