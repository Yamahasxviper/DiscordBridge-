; BanChatCommands admin configuration.
;
; ── How to persist settings across mod updates ───────────────────────────────
;
; This file ships with the mod and may be replaced when you update BanChatCommands.
; To keep your admin list permanently, place your overrides in ONE of:
;
;   1. Saved/BanChatCommands/BanChatCommands.ini  <- written by BanChatCommands on
;                                                    every start; survives mod wipes
;   2. Saved/Config/<Platform>/BanChatCommands.ini <- standard UE config override
;
; Both use the same [/Script/BanChatCommands.BanChatCommandsConfig] section header.
; Restart the server after editing any config file.
;
; ── Admin list ───────────────────────────────────────────────────────────────
;
; EOS Product User IDs — each +AdminEosPUIDs= entry grants that player permission
; to run the following commands from in-game chat:
;
;   /ban, /tempban, /unban, /bancheck, /banlist,
;   /linkbans, /unlinkbans, /playerhistory
;
; EOS PUIDs are 32-character hex strings (case-insensitive).
; Players can find their own PUID by running /whoami in-game.
;
; Note: On CSS Dedicated Server all players are identified by their EOS Product
; User ID regardless of their launch platform (Steam, Epic Games Store, etc.).
;
; If the list is empty, those commands are only usable from the server console.
; /whoami is always available to all connected players regardless of this setting.
; The server console always bypasses the admin list.
;
; Example:
;   [/Script/BanChatCommands.BanChatCommandsConfig]
;   +AdminEosPUIDs=00020aed06f0a6958c3c067fb4b73d51
;   +AdminEosPUIDs=aabbccdd11223344aabbccdd11223344

[/Script/BanChatCommands.BanChatCommandsConfig]
; +AdminEosPUIDs=YOUR_EOS_PUID_HERE
; +ModeratorEosPUIDs=MODERATOR_EOS_PUID_HERE
BanListPageSize=10
ModBanDurationMinutes=30
; Maximum mute duration (minutes) a moderator may pass to /tempunmute.
; 0 = no ceiling (same as admins).
MaxModMuteDurationMinutes=0
; Set to True to allow moderators to use /note and /notes (default: only admins).
bAllowModNotes=False
