; Alpakit build-target configuration for TicketSystem.
;
; TicketSystem is a standalone server-side mod. It can run on its own with a
; dedicated Discord bot token (BotToken= in DefaultTickets.ini), or paired with
; the DiscordBridge mod which injects itself as the Discord provider automatically.
; RequiredOnRemote=false – players do not need to install this mod.
; Runs on:
;   Windows       – Windows listen-server hosts.
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
