[StageSettings]
+AdditionalNonUSFDirectories=Config
# DefaultTickets.ini is user-editable runtime configuration (contains
# bot credentials and all server operator settings).  Excluding it from the
# package prevents mod updates from overwriting a server operator's configured
# file.  The mod automatically saves a backup to Saved/Config/TicketSystem.ini
# and restores settings on the next server start.
+ExcludedNonUSFFiles=Config/DefaultTickets.ini
