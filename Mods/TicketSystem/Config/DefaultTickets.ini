[TicketSystem]
; ==============================================================================
; TicketSystem – Configuration
; ==============================================================================
;
; This file controls the standalone TicketSystem mod, which adds a button-based
; Discord support-ticket panel on top of the DiscordBridge mod.
; Members click a button to open a private ticket channel visible only to them
; and the configured admin/support role.
;
; BACKUP
; -------
;  The mod automatically saves a backup of these settings on every server start:
;    <ServerRoot>/FactoryGame/Saved/Config/TicketSystem.ini
;  Settings are restored automatically after a mod update resets this file.
;
; HOW THE TICKET SYSTEM WORKS
; ----------------------------
;  1. An admin runs "!admin ticket-panel" in any channel where they hold the
;     TicketNotifyRoleId (or the DiscordBridge ServerControlCommandRoleId).
;  2. The bot posts the button panel to the TicketPanelChannelId channel.
;  3. A member clicks a button (built-in or custom reason).
;     A reason modal (popup form) appears first so the member can describe their
;     request before the ticket is created.
;  4. The bot creates a private ticket channel visible only to that member and
;     the role set in TicketNotifyRoleId (which also receives an @mention ping).
;  5. Admins review and act on the ticket directly inside that channel.
;  6. Either side clicks "Close Ticket" to delete the channel when done.
;
; TICKET TYPES
; -------------
;  Built-in:
;    whitelist - member requests to be added to the server whitelist
;    help      - member submits a general help or support question
;    report    - member reports another player to the admins
;
;  Custom:
;    Add as many TicketReason=Label|Description lines as you need (see below).
;
;  Each built-in type can be individually enabled or disabled (see
;  TicketWhitelistEnabled, TicketHelpEnabled, TicketReportEnabled below).
;
; QUICK SETUP
; ------------
;  1. Create a dedicated, read-only "open-a-ticket" channel in Discord.
;  2. Set TicketPanelChannelId to that channel's ID.
;  3. Create a private admin channel and set TicketChannelId to it (optional).
;  4. Set TicketNotifyRoleId to your admin/support role ID.
;  5. (Optional) Add custom ticket reasons using TicketReason=Label|Description.
;  6. Restart the server.
;  7. Run "!ticket-panel" in any channel where you hold the TicketNotifyRoleId.
;  8. Members click a button; the bot creates a private channel for each ticket.
;
; ==============================================================================

; ------------------------------------------------------------------------------
; TICKET CHANNEL
; ------------------------------------------------------------------------------

; Discord channel ID of a dedicated channel where submitted ticket notifications
; are posted for admin review (optional, used only when not using private ticket
; channels via the button panel).
; When empty, no separate admin notification is sent (the ticket channel itself
; serves as the notification).
;
; Multiple channels (comma-separated):
;   TicketChannelId=345678901234567890,678901234567890123
;
; How to get the channel ID: enable Developer Mode in Discord
; (User Settings -> Advanced -> Developer Mode), right-click the channel,
; and choose "Copy Channel ID".
; Example: TicketChannelId=345678901234567890
TicketChannelId=

; ------------------------------------------------------------------------------
; TICKET TYPE TOGGLES
; ------------------------------------------------------------------------------

; Whether the Whitelist Request button is shown on the ticket panel.
; When True (default), members can open whitelist tickets via the panel.
; When False, the button is hidden and this ticket type is disabled.
; Default: True
TicketWhitelistEnabled=True

; Whether the Help / Support button is shown on the ticket panel.
; When True (default), members can open help tickets via the panel.
; When False, the button is hidden and this ticket type is disabled.
; Default: True
TicketHelpEnabled=True

; Whether the Report a Player button is shown on the ticket panel.
; When True (default), members can open report tickets via the panel.
; When False, the button is hidden and this ticket type is disabled.
; Default: True
TicketReportEnabled=True

; ------------------------------------------------------------------------------
; ADMIN NOTIFICATIONS
; ------------------------------------------------------------------------------

; Discord role ID to @mention in every ticket notification posted to
; TicketChannelId AND inside every newly created ticket channel.
; When set, the bot prepends "@<Role>" to each ticket message so all members
; of that role receive a ping when a new ticket is submitted.
; Leave empty to post ticket notifications without any role mention.
;
; IMPORTANT: When using the button-based ticket panel (see TicketPanelChannelId
; below), this role is also granted view and write access to every created
; ticket channel.  Only members holding this role will be able to see and
; respond to tickets.  Make sure it is set to your admin / support role.
;
; TICKET PANEL COMMAND: Members holding this role can post the ticket panel by
; typing "!ticket-panel" in any Discord channel, without needing any other
; admin permission.  This lets ticket admins manage the panel independently.
;
; TIP: Create a dedicated "Support" or "Moderator" role in your Discord server
; and set its ID here so your team is always notified of new tickets promptly.
;
; How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: TicketNotifyRoleId=123456789012345678
TicketNotifyRoleId=

; ------------------------------------------------------------------------------
; BUTTON-BASED TICKET PANEL (no commands needed by members)
; ------------------------------------------------------------------------------

; Discord channel ID where the bot posts the ticket selection panel - a message
; with clickable buttons (one per ticket type).  Members click a button instead
; of typing commands.  A private channel is then created automatically that only
; the member and the admin/support role (TicketNotifyRoleId) can see.
;
; WORKFLOW:
;  1. Create a dedicated, read-only "open-a-ticket" channel in Discord.
;     Members should be able to see and read the channel but NOT send messages
;     there (so the panel message stays visible at the top).
;  2. Set TicketPanelChannelId to that channel's ID.
;  3. Set TicketNotifyRoleId to your admin/support role (required to run the
;     next step and to receive access to ticket channels).
;  4. Run "!ticket-panel" in any channel. Any member holding the
;     TicketNotifyRoleId role can run this command (no extra role needed).
;  5. Members click a button and a private ticket channel is created for them.
;
; REQUIRED BOT PERMISSIONS (for the button-based panel to work):
;   Manage Channels  - to create and delete ticket channels
;   View Channel     - to see channels in the server
;   Send Messages    - to post the welcome message and close button
;
; Leave empty to disable the button panel (tickets can still be opened via
; the !ticket command if you configure it separately).
; Example: TicketPanelChannelId=123456789012345678
TicketPanelChannelId=

; Optional Discord category ID to place created ticket channels under.
; When set, every new ticket channel appears inside this category in the
; Discord sidebar, keeping all tickets grouped in one place.
; Leave empty to create ticket channels without a category.
;
; How to get the category ID: enable Developer Mode in Discord, right-click the
; category name in the channel list, and choose "Copy Channel ID".
; Example: TicketCategoryId=123456789012345678
TicketCategoryId=

; ------------------------------------------------------------------------------
; CUSTOM TICKET REASONS
; ------------------------------------------------------------------------------
;
; Add your own ticket reason buttons to the panel.  Each line creates one
; additional button.  The format is:
;
;   TicketReason=Label|Description
;
;   Label       - Text shown on the Discord button (keep short, 80 chars max).
;   Description - Brief summary line shown in the panel message body.
;                 Also displayed as the opening context inside the ticket channel.
;
; You can add as many TicketReason= lines as you need.  Discord allows at most
; 25 buttons per message (5 rows x 5 buttons), so the combined count of enabled
; built-in types and custom reasons must not exceed 25.
;
; When a member clicks a custom button:
;  - A private ticket channel named  ticket-<slug>-<username>  is created.
;  - The admin/support role (TicketNotifyRoleId) is @mentioned inside the
;    channel and is granted view/write access.
;  - A welcome message shows the reason label and description.
;  - A "Close Ticket" button is posted so either party can delete the channel.
;
; To remove a custom reason, simply delete (or comment out) its TicketReason=
; line and re-post the panel with "!ticket-panel".
;
; Examples:
;   TicketReason=Bug Report|Report a bug or technical issue with the server
;   TicketReason=Suggestion|Submit a suggestion or feature request
;   TicketReason=Appeal|Appeal a ban or other moderation action
;
