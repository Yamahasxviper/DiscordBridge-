; DiscordBridge – engine-level overrides staged with the mod
; =============================================================================
;
; This file is included in the DiscordBridge mod package by Alpakit
; (via the +AdditionalNonUSFDirectories=Config entry in PluginSettings.ini).
; Settings here take effect automatically on CSS dedicated servers that have
; the mod installed — no manual user edits are required.
;
; HOW THIS WORKS
; ---------------
; When SML loads mods on a CSS dedicated server it merges each mod's
; Config/DefaultEngine.ini into the engine config (GEngineIni) before
; game-instance subsystems are initialised.  Settings here therefore apply
; automatically on every server start and after mod updates.
;
; NOTE ON BUILD vs. RUNTIME
; -------------------------
; The project-level Config/DefaultEngine.ini (and Config/LinuxServer/DefaultEngine.ini)
; are read by Alpakit during the cook/build process (they affect shader compilation,
; cooker behaviour, etc.).  They are NOT packaged into the mod's .zip and therefore
; do NOT apply to CSS dedicated servers running the mod.
;
; Settings in THIS file ARE staged with the mod and deployed alongside it.
; Where timing prevents early-startup config injection (e.g. libcurl
; initialisation before SML merges plugin configs), users should also apply
; the equivalent setting in their server's Saved/Config/LinuxServer/Engine.ini.
;
; ONLINE PLATFORM SETTINGS
; -------------------------
; These two settings are required for the ban system to resolve platform IDs
; (EOS PUIDs and Steam64 IDs) at player join time.
;
; DiscordBridge ships these settings directly here so that no separate mod
; or manual server configuration is needed.
;
[OnlineSubsystem]
DefaultPlatformService=EOS
NativePlatformService=Steam

; SSL / CERTIFICATE VERIFICATION
; --------------------------------
; On Linux dedicated servers the system CA certificate bundle is often absent
; from the path libcurl expects, causing all outgoing HTTPS connections
; (including Discord REST API calls) to fail with an SSL verification error.
;
; bVerifyPeer=false disables certificate-chain verification.  The connection
; is still TLS-encrypted so traffic cannot be read in transit, but the
; server's identity is not validated against a CA chain.  This is acceptable
; for calls to well-known, HSTS-pinned endpoints such as discord.com.
;
; If you prefer full certificate verification, install the OS CA bundle on
; your server instead and remove (or comment out) the [HTTP] section below:
;   Debian / Ubuntu:  sudo apt-get install -y ca-certificates
;   CentOS / RHEL:    sudo yum install -y ca-certificates
;
; If libcurl is initialised before this plugin config is merged you may need
; to apply the same setting directly in your server's user config:
;   <ServerRoot>/FactoryGame/Saved/Config/LinuxServer/Engine.ini
; and add the two lines:
;   [HTTP]
;   bVerifyPeer=false
;
[HTTP]
bVerifyPeer=false
