; GameplayTags registered by the DiscordBridge mod.
; These tags are dispatched via UGameplayEventsSubsystem so that other mods and
; Blueprint code can react to Discord bridge events without depending on
; UDiscordBridgeSubsystem directly.
;
; Dispatched tags (DiscordBridge fires these):
;   DiscordBridge.Connected         – Discord Gateway connected and bot identified.
;   DiscordBridge.Disconnected      – Discord Gateway connection lost (string payload = reason).
;   DiscordBridge.Player.Joined     – A player passed all checks and joined (string payload = player name).
;   DiscordBridge.Player.Left       – A tracked player disconnected (string payload = player name).
;   DiscordBridge.Message.FromDiscord – Message received from Discord channel
;                                       (string payload = "Username: Message").
;
; Subscribable tags (other mods dispatch these to drive DiscordBridge):
;   DiscordBridge.Message.ToDiscord – Post a plain-text message to the main Discord
;                                     channel(s) (string payload = message text).

[/Script/GameplayTags.GameplayTagsList]
GameplayTagList=(Tag="DiscordBridge",DevComment="Root tag for all DiscordBridge gameplay events")
GameplayTagList=(Tag="DiscordBridge.Connected",DevComment="Fired when the Discord Gateway connection is established and the bot has been identified")
GameplayTagList=(Tag="DiscordBridge.Disconnected",DevComment="Fired when the Discord Gateway connection is lost; string payload contains the disconnect reason")
GameplayTagList=(Tag="DiscordBridge.Player",DevComment="Category for player lifecycle events relayed through Discord Bridge")
GameplayTagList=(Tag="DiscordBridge.Player.Joined",DevComment="Fired when a player passes all ban/whitelist checks and joins the server; string payload is the player name")
GameplayTagList=(Tag="DiscordBridge.Player.Left",DevComment="Fired when a tracked player disconnects from the server; string payload is the player name")
GameplayTagList=(Tag="DiscordBridge.Message",DevComment="Category for message events relayed through Discord Bridge")
GameplayTagList=(Tag="DiscordBridge.Message.FromDiscord",DevComment="Fired when a message is received from the bridged Discord channel; string payload is 'Username: Message'")
GameplayTagList=(Tag="DiscordBridge.Message.ToDiscord",DevComment="Dispatch this tag (string payload = message text) to post a plain-text message to the main Discord channel(s)")
