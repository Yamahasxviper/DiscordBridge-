[DiscordBridge]
; ==============================================================================
; DiscordBridge - Whitelist Configuration
; ==============================================================================
;
; This file controls the built-in server whitelist for the DiscordBridge mod.
; Edit this file to restrict which players are allowed to join the server.
;
; BACKUP
; -------
;  The mod automatically saves a backup of these settings on every server start:
;    <ServerRoot>/FactoryGame/Saved/Config/Whitelist.ini
;  Settings are restored automatically after a mod update resets this file.
;
; WHITELIST vs BAN SYSTEM
; ------------------------
;  The whitelist and the ban system are completely independent of each other.
;  You can use either one, both, or neither:
;
;    Whitelist only:  WhitelistEnabled=True,  BanSystemEnabled=False (DefaultBan.ini)
;    Ban system only: WhitelistEnabled=False, BanSystemEnabled=True  (DefaultBan.ini)
;    Both active:     WhitelistEnabled=True,  BanSystemEnabled=True
;    Neither active:  WhitelistEnabled=False, BanSystemEnabled=False
;
;  When BOTH are active, a player is kicked if they fail EITHER check (they
;  must be whitelisted AND not banned to join).
;
; WHITELIST DATA FILE
; --------------------
;  Approved player names are stored in:
;    <ServerRoot>/FactoryGame/Saved/ServerWhitelist.json
;  This file is managed automatically by the !whitelist add / !whitelist remove
;  commands. Do not edit it manually while the server is running.
;
; QUICK SETUP
; ------------
;  1. Set WhitelistEnabled=True to turn on the whitelist.
;  2. Set WhitelistCommandRoleId to a Discord role ID so admins can manage it.
;  3. (Optional) Set WhitelistRoleId if you want Discord role membership to
;     count as a whitelist pass (no JSON entry needed for role members).
;  4. (Optional) Set WhitelistChannelId for a members-only Discord channel.
;  5. Restart the server.
;  6. Use !whitelist add <player_name> in Discord to add approved players.
;
; ==============================================================================

; ------------------------------------------------------------------------------
; WHITELIST ON/OFF
; ------------------------------------------------------------------------------

; Whether the whitelist is enforced when the server starts.
; When True, only players listed in ServerWhitelist.json (or who hold the
; WhitelistRoleId Discord role, if configured) are allowed to join. All other
; players are kicked immediately with the WhitelistKickReason message.
; When False, any player can join regardless of the whitelist JSON file.
;
; NOTE: This value is re-applied on EVERY server restart and is the authoritative
; toggle. The !whitelist on / !whitelist off Discord commands change the in-memory
; state for the current session only; they do NOT persist across restarts.
; Default: False
WhitelistEnabled=False

; ------------------------------------------------------------------------------
; DISCORD COMMAND ROLE (who can manage the whitelist from Discord)
; ------------------------------------------------------------------------------

; Discord role ID whose members are permitted to run !whitelist commands
; in the bridged Discord channel.
; When set, ONLY members of this role can use !whitelist management commands.
; When left empty (the default), ALL !whitelist commands are disabled for every
; Discord user until a role ID is provided here (deny-by-default).
;
; IMPORTANT: Holding this role grants the ability to add or remove players from
; the whitelist, but does NOT automatically grant access to the game server.
; Role holders are still subject to normal whitelist and ban checks when joining.
;
; How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: WhitelistCommandRoleId=123456789012345678
WhitelistCommandRoleId=

; ------------------------------------------------------------------------------
; DISCORD WHITELIST COMMANDS
; ------------------------------------------------------------------------------

; Prefix used to trigger whitelist management commands in the bridged Discord
; channel. Set to an empty string to disable Discord-based whitelist management.
;
; Available commands (replace !whitelist with your chosen prefix):
;   !whitelist on                        - enable the whitelist for this session
;   !whitelist off                       - disable the whitelist for this session
;   !whitelist add <player_name>         - add a player to ServerWhitelist.json
;   !whitelist remove <player_name>      - remove a player from ServerWhitelist.json
;   !whitelist list                      - show all whitelisted player names
;   !whitelist status                    - show whether the whitelist and ban
;                                          system are currently enabled/disabled
;   !whitelist role add <discord_id>     - grant the WhitelistRoleId Discord role
;                                          to a Discord user by their user ID
;                                          (bot needs Manage Roles permission)
;   !whitelist role remove <discord_id>  - revoke the WhitelistRoleId Discord role
;                                          from a Discord user by their user ID
;
; Default: !whitelist
; Example (custom prefix): WhitelistCommandPrefix=!wl
WhitelistCommandPrefix=!whitelist

; ------------------------------------------------------------------------------
; DISCORD ROLE INTEGRATION (optional)
; ------------------------------------------------------------------------------

; Discord role ID used to identify automatically whitelisted members.
; When set, any player whose in-game name matches a Discord display name of
; a member holding this role is allowed through the whitelist check without
; needing an explicit entry in ServerWhitelist.json.
;
; Additionally:
;   - Messages in WhitelistChannelId (below) are relayed to the game only when
;     the sender holds this role.
;   - The !whitelist role add/remove commands assign or revoke this role via
;     the Discord REST API (the bot must have the Manage Roles permission).
;   - Role membership is cached at bot startup and kept up to date by Discord
;     guild member events in real time.
;
; Leave empty to disable Discord role integration (use only the JSON file).
; How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: WhitelistRoleId=111222333444555666
WhitelistRoleId=

; Discord channel ID of a dedicated channel reserved for whitelisted members.
; When set, only members who hold the WhitelistRoleId Discord role can send
; messages in this channel that are relayed to the in-game chat. Messages from
; non-role members in this channel are silently ignored (not relayed).
; Leave empty to disable the whitelist-only channel feature.
;
; Multiple channels (comma-separated):
;   WhitelistChannelId=222333444555666777,444555666777888999
;
; How to get the channel ID: right-click the channel in Discord with Developer
; Mode enabled -> Copy Channel ID.
; Example: WhitelistChannelId=222333444555666777
WhitelistChannelId=

; ------------------------------------------------------------------------------
; KICK MESSAGES
; ------------------------------------------------------------------------------

; Message posted to the main bridged Discord channel whenever a non-whitelisted
; player tries to join the server and is kicked.
; Available placeholder:
;   %PlayerName%  - the in-game name of the player who was denied
; Leave empty (delete everything after the =) to disable this notification.
; Default: :boot: **%PlayerName%** tried to join but is not on the whitelist and was kicked.
; Example: WhitelistKickDiscordMessage=:no_entry: **%PlayerName%** is not whitelisted.
WhitelistKickDiscordMessage=:boot: **%PlayerName%** tried to join but is not on the whitelist and was kicked.

; Text displayed to the player in the Satisfactory disconnected/kicked screen
; when they are kicked because they are not on the whitelist.
; Keep this message clear and actionable so players know how to request access.
; Leave empty to use the built-in default message.
; Default: You are not on this server's whitelist. Contact the server admin to be added.
; Example: WhitelistKickReason=You are not whitelisted. DM an admin on Discord to request access.
WhitelistKickReason=

; ------------------------------------------------------------------------------
; IN-GAME WHITELIST COMMANDS
; ------------------------------------------------------------------------------

; Prefix used to trigger whitelist management commands typed in the Satisfactory
; in-game chat. Set to an empty string to disable in-game whitelist management.
;
; Available in-game commands (replace !whitelist with your chosen prefix):
;   !whitelist on             - enable the whitelist for this session
;   !whitelist off            - disable the whitelist for this session
;   !whitelist add <name>     - add a player by in-game name
;   !whitelist remove <name>  - remove a player by in-game name
;   !whitelist list           - list all whitelisted players
;   !whitelist status         - show current whitelist and ban system state
;
; Note: in-game commands do NOT support Discord role management
; (!whitelist role add / !whitelist role remove). Use Discord for those.
;
; Default: !whitelist
; Example (custom prefix): InGameWhitelistCommandPrefix=!wl
InGameWhitelistCommandPrefix=!whitelist
