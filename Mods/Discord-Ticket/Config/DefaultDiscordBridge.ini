[DiscordBridge]
; ==============================================================================
; DiscordBridge - Primary Configuration File
; ==============================================================================
;
; QUICK START (minimum required steps)
; -------------------------------------
;  1. Create a Discord bot at https://discord.com/developers/applications
;       - Under the "Bot" tab, enable these Privileged Gateway Intents:
;           Presence Intent, Server Members Intent, Message Content Intent
;       - Copy the bot token from "Bot -> Reset Token"
;  2. Invite the bot to your server with these permissions:
;       Send Messages, Read Message History
;       (also Manage Roles if you use !whitelist role or !ban role commands)
;  3. Enable Developer Mode in Discord (User Settings -> Advanced -> Developer Mode)
;  4. Right-click your target channel -> Copy Channel ID
;  5. Fill in BotToken and ChannelId below and save the file.
;     The bridge connects automatically within 30 seconds – no server restart required.
;
; BACKUP / MOD UPDATES
; ---------------------
;  The mod automatically saves a backup of all settings on every server start:
;    <ServerRoot>/FactoryGame/Saved/Config/DiscordBridge.ini
;  If a mod update resets this file your settings are restored automatically
;  on the next server start, so you never have to re-enter credentials.
;
; OTHER CONFIG FILES (same folder as this file)
; -----------------------------------------------
;  DefaultWhitelist.ini  - Whitelist on/off, roles, kick messages, commands
;  DefaultBan.ini        - Ban system on/off, roles, kick messages, commands
;  DefaultTickets.ini    - ALL ticket system settings: channels, role mentions,
;                          built-in ticket types, and custom ticket reasons
;  DefaultEngine.ini     - Engine-level overrides staged with the mod.
;                          Contains [HTTP] bVerifyPeer=false for Linux servers
;                          that lack a CA certificate bundle (see SSL NOTE below).
;
; SSL NOTE (Linux dedicated servers)
; ------------------------------------
;  On stripped-down Linux server images the system CA certificate bundle that
;  libcurl needs for HTTPS verification may be missing.  This causes all
;  Discord REST API calls to fail with an SSL error.
;
;  The mod ships Mods/DiscordBridge/Config/DefaultEngine.ini with
;  [HTTP] bVerifyPeer=false which is staged into the mod package and may
;  automatically fix this on CSS servers that merge plugin engine configs.
;
;  If you still see SSL failures after installing the mod, apply the setting
;  directly in your server's user config:
;    File: <ServerRoot>/FactoryGame/Saved/Config/LinuxServer/Engine.ini
;    Add:
;      [HTTP]
;      bVerifyPeer=false
;
;  Alternatively, install the OS CA certificate package and leave peer
;  verification enabled (the more secure option):
;    Debian / Ubuntu:  sudo apt-get install -y ca-certificates
;    CentOS / RHEL:    sudo yum install -y ca-certificates
;
; ==============================================================================

; ------------------------------------------------------------------------------
; CONNECTION
; ------------------------------------------------------------------------------

; Your Discord bot token.
; Find it at: Discord Developer Portal -> your app -> Bot -> Reset Token
; IMPORTANT: Treat this like a password. Never share it or commit it to source
; control. Anyone with this token can control your bot.
; The Discord bridge polls for credentials every 30 seconds. Once both BotToken
; and ChannelId are set and saved, the bridge connects automatically without a
; server restart. Leave this empty if you want to configure credentials later.
; Example: BotToken=MTA2...your_token_here...
BotToken=

; The Discord channel ID(s) to bridge with the Satisfactory in-game chat.
; The value must be a numeric channel ID (not the channel name).
; All listed channels receive game-to-Discord messages and are monitored for
; Discord-to-game message relaying as well as bot commands.
;
; Single channel:
;   ChannelId=123456789012345678
; Multiple channels (comma-separated, no spaces required):
;   ChannelId=123456789012345678,987654321098765432
;
; How to get the channel ID: enable Developer Mode in Discord
; (User Settings -> Advanced -> Developer Mode), then right-click the channel
; and choose "Copy Channel ID".
ChannelId=

; A human-readable display name for this server.
; Used as the %ServerName% placeholder in GameToDiscordFormat and
; PlayerCountPresenceFormat. Leave empty to omit the label from those strings.
; Example: ServerName=My Factory Server
ServerName=

; ------------------------------------------------------------------------------
; CHAT MESSAGE FORMATS
; ------------------------------------------------------------------------------

; Format string for messages forwarded from the Satisfactory in-game chat
; to the bridged Discord channel.
; Available placeholders:
;   %ServerName%  - the value of the ServerName setting above
;   %PlayerName%  - the in-game name of the player who sent the message
;   %Message%     - the raw text of the chat message
; Discord markdown (bold, italics, code blocks, emoji shortcodes, etc.) works.
; Leave empty to use the default format.
; Default: **%PlayerName%**: %Message%
; Examples:
;   GameToDiscordFormat=**%PlayerName%**: %Message%
;   GameToDiscordFormat=**[%ServerName%] %PlayerName%**: %Message%
;   GameToDiscordFormat=`%PlayerName%` says: %Message%
GameToDiscordFormat=

; Format string for the complete line shown in the Satisfactory in-game chat
; when a Discord message is relayed into the game.
; Available placeholders:
;   %Username%    - the Discord display name of the message sender
;   %PlayerName%  - alias for %Username% (same value, different name)
;   %Message%     - the text of the Discord message
; Leave empty to use the default format.
; Default: [Discord] %Username%: %Message%
; Examples:
;   DiscordToGameFormat=[Discord] %Username%: %Message%
;   DiscordToGameFormat=%Username% (Discord): %Message%
;   DiscordToGameFormat=<Discord> %Username%: %Message%
DiscordToGameFormat=

; ------------------------------------------------------------------------------
; BEHAVIOUR
; ------------------------------------------------------------------------------

; Whether to ignore messages sent by other Discord bots.
; When True (recommended), messages posted by bot accounts in the bridged
; channel are silently ignored and never relayed to the game. This prevents
; echo loops when multiple bots share the same channel (e.g. a music bot or
; a second DiscordBridge instance on another server also posting there).
; Set to False only if you intentionally want bot messages forwarded in-game.
; Default: True
IgnoreBotMessages=

; ------------------------------------------------------------------------------
; SERVER STATUS MESSAGES
; ------------------------------------------------------------------------------

; Master on/off switch for server online/offline status notifications.
; When True, the bot posts ServerOnlineMessage and ServerOfflineMessage to
; Discord whenever the server starts or shuts down.
; When False, no status messages are ever posted, regardless of the message
; text configured below.
; Default: True
ServerStatusMessagesEnabled=True

; Discord channel ID(s) for a dedicated server status channel.
; When set, online/offline notifications are posted to these channel(s) instead
; of the main bridged channel (ChannelId). This keeps status alerts separate
; from regular chat so they are easy to find.
; Leave empty to post status messages to the main bridged channel (ChannelId).
;
; Single status channel:
;   StatusChannelId=111222333444555666777
; Multiple status channels (comma-separated):
;   StatusChannelId=111222333444555666777,888999000111222333444
;
; How to get the channel ID: right-click the channel in Discord with Developer
; Mode enabled -> Copy Channel ID.
StatusChannelId=

; Message posted to Discord when the server finishes starting up.
; Discord emoji shortcodes (e.g. :green_circle:) and markdown are supported.
; Leave this value empty (delete everything after the =) to disable the
; online notification entirely.
; Default: :green_circle: Server is now **online**!
; Examples:
;   ServerOnlineMessage=:white_check_mark: **%ServerName%** is online!
;   ServerOnlineMessage=Server is back online. Welcome back!
ServerOnlineMessage=:green_circle: Server is now **online**!

; Message posted to Discord when the server shuts down gracefully.
; Discord emoji shortcodes and markdown are supported.
; Leave this value empty (delete everything after the =) to disable the
; offline notification entirely.
; Default: :red_circle: Server is now **offline**.
; Examples:
;   ServerOfflineMessage=:octagonal_sign: **%ServerName%** has gone offline.
;   ServerOfflineMessage=Server is shutting down. See you next time!
ServerOfflineMessage=:red_circle: Server is now **offline**.

; Message posted to Discord when the server crashes unexpectedly (i.e. exits
; due to an error rather than a graceful !admin stop / !admin restart).
; A crash is detected via Unreal Engine's fatal-error hook, which covers
; assertion failures, fatal logs, and most UE-level crashes.  Low-level
; hardware faults (e.g. OOM kill by the OS) cannot always be detected.
; Discord emoji shortcodes and markdown are supported.
; Leave this value empty (delete everything after the =) to disable the
; crash notification entirely.
; Default: :warning: **Server crashed!** The server encountered an unexpected error.
; Examples:
;   ServerCrashMessage=:skull: **Server crashed!** Restarting soon...
;   ServerCrashMessage=:rotating_light: **%ServerName%** has crashed and needs a restart.
ServerCrashMessage=:warning: **Server crashed!** The server encountered an unexpected error.

; ------------------------------------------------------------------------------
; PLAYER JOIN / LEAVE NOTIFICATIONS
; ------------------------------------------------------------------------------

; Message posted to the bridged Discord channel when a player joins the server.
; Only sent for players that pass all ban and whitelist checks (i.e. who are
; actually allowed to play). Kicked players do not trigger this message.
; Available placeholders:
;   %PlayerName%  - the in-game name of the joining player
;   %Platform%    - the player's platform (e.g. "Steam", "Epic Games Store")
; Discord markdown and emoji shortcodes are supported.
; Leave this value empty (delete everything after the =) to disable join
; notifications entirely.
; Default: :arrow_right: **%PlayerName%** joined the server.
; Examples:
;   PlayerJoinMessage=:green_circle: **%PlayerName%** connected.
;   PlayerJoinMessage=%PlayerName% has joined the game!
;   PlayerJoinMessage=:arrow_right: **%PlayerName%** (%Platform%) joined the server.
PlayerJoinMessage=:arrow_right: **%PlayerName%** joined the server.

; Message posted to the bridged Discord channel when a player leaves the server.
; This is sent for both clean disconnects and connection timeouts (the
; UNetConnection TIMED OUT case) so admins are always informed when a player
; drops, regardless of how the connection ended.
; Available placeholders:
;   %PlayerName%  - the in-game name of the leaving player
;   %Platform%    - the player's platform (e.g. "Steam", "Epic Games Store")
; Discord markdown and emoji shortcodes are supported.
; Leave this value empty (delete everything after the =) to disable leave
; notifications entirely.
; Default: :arrow_left: **%PlayerName%** left the server.
; Examples:
;   PlayerLeaveMessage=:red_circle: **%PlayerName%** disconnected.
;   PlayerLeaveMessage=%PlayerName% has left the game.
;   PlayerLeaveMessage=:arrow_left: **%PlayerName%** (%Platform%) left the server.
PlayerLeaveMessage=:arrow_left: **%PlayerName%** left the server.

; Message posted to the bridged Discord channel when a new network connection
; is accepted by the server before the player's login completes.  This fires
; as soon as the server detects an incoming connection, before any player name
; or identity is known.  Useful for monitoring connection attempts and for
; correlating pre-login activity with crash events.
; Available placeholder:
;   %RemoteAddr%  - the remote IP address and port (e.g. 203.0.113.42:54321)
; Discord markdown and emoji shortcodes are supported.
; Leave this value empty (delete everything after the =) to disable this
; notification (disabled by default to avoid noisy channels on busy servers).
; Examples:
;   PlayerConnectingMessage=:satellite: New connection attempt from %RemoteAddr%
;   PlayerConnectingMessage=:link: A client is connecting (%RemoteAddr%)...
PlayerConnectingMessage=

; Message posted to the bridged Discord channel when a network connection is
; dropped before login completes (e.g. handshake failure, rejected login,
; client-side cancel, or a server crash mid-join).  Together with
; PlayerConnectingMessage and the server crash notification, this lets admins
; correlate which connection attempt preceded an unexpected crash.
; Available placeholder:
;   %RemoteAddr%  - the remote IP address and port that was dropped.
; Discord markdown and emoji shortcodes are supported.
; Leave this value empty (delete everything after the =) to disable this
; notification (disabled by default).
; Examples:
;   PlayerConnectionDroppedMessage=:warning: Pre-login connection from %RemoteAddr% dropped.
;   PlayerConnectionDroppedMessage=:x: Connection attempt from %RemoteAddr% did not complete login.
PlayerConnectionDroppedMessage=

; ------------------------------------------------------------------------------
; PLAYER COUNT PRESENCE
; ------------------------------------------------------------------------------

; Whether the bot's Discord status (the "Now Playing" line on its profile)
; should be updated periodically to display the current player count.
; When True, the bot's activity shows live player count at all times.
; When False, the bot's status is left blank (no activity shown).
; Default: True
ShowPlayerCountInPresence=

; The text displayed in the bot's Discord presence / activity line.
; Available placeholders:
;   %PlayerCount%  - the current number of players online on the server
;   %ServerName%   - the value of the ServerName setting above
; Leave empty to use the default format.
; Default: Satisfactory with %PlayerCount% players
; Examples:
;   PlayerCountPresenceFormat=Satisfactory with %PlayerCount% players
;   PlayerCountPresenceFormat=%ServerName% - %PlayerCount% online
;   PlayerCountPresenceFormat=%PlayerCount%/%MaxPlayers% players on %ServerName%
PlayerCountPresenceFormat=

; How often (in seconds) to update the bot's presence with the latest player
; count. Lower values give fresher data but consume more Discord API quota.
; Values below 15 are automatically clamped to 15 to respect Discord's rate
; limits. Setting this very high (e.g. 300) reduces API calls on busy servers.
; Default: 60
PlayerCountUpdateIntervalSeconds=

; The activity type that controls the verb shown before the presence text
; on the bot's Discord profile card.
;   0 = Playing       -> "Playing Satisfactory with 4 players"
;   2 = Listening to  -> "Listening to Satisfactory with 4 players"
;   3 = Watching      -> "Watching Satisfactory with 4 players"
;   5 = Competing in  -> "Competing in Satisfactory with 4 players"
; Note: type 1 (Streaming) requires a stream URL and is not supported here.
;       type 4 (Custom Status) does not show a prefix verb.
; Default: 0 (Playing)
PlayerCountActivityType=

; ------------------------------------------------------------------------------
; SERVER INFO COMMANDS (public, no role required)
; ------------------------------------------------------------------------------

; Prefix used to trigger server-information commands in the bridged Discord
; channel. These commands are available to ALL members of the channel; no
; special Discord role is needed.
; Set to an empty string to disable all server-info commands entirely.
;
; Available commands (replace !server with your chosen prefix):
;   !server players  - list the in-game names of all currently online players
;   !server online   - alias for !server players
;   !server status   - show server name, online/offline state, and player count
;   !server help     - list all bot commands available in this channel
;
; Default: !server
; Example (custom prefix): ServerInfoCommandPrefix=!sf
ServerInfoCommandPrefix=!server

; ------------------------------------------------------------------------------
; SERVER STATUS NOTIFICATIONS (role ping)
; ------------------------------------------------------------------------------

; Discord role ID to @mention in every server online/offline status message.
; When set, the bot prepends "@<Role>" to ServerOnlineMessage and
; ServerOfflineMessage so all members of that role receive a ping notification
; when the server starts or stops.
; Leave empty to post status messages without any role mention.
; Special keyword values (no quotes):
;   everyone  - mentions @everyone (pings all server members)
;   here      - mentions @here (pings all online server members)
;
; How to get a role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: ServerStatusNotifyRoleId=123456789012345678
; Example: ServerStatusNotifyRoleId=everyone
ServerStatusNotifyRoleId=

; ------------------------------------------------------------------------------
; SERVER CONTROL COMMANDS (admin only)
; ------------------------------------------------------------------------------

; Admin-only commands that let authorised Discord members stop or restart the
; server from within the bridged Discord channel.
;
; SECURITY: These commands are DENY-BY-DEFAULT. If ServerControlCommandRoleId
; is left empty (the default), ALL control commands are disabled for everyone,
; regardless of the prefix setting below. You must set a role ID to unlock them.
; Only trusted administrators should hold the control command role.
;
; HOW STOP/RESTART WORK WITH YOUR PROCESS SUPERVISOR
;   !admin stop    - exits the server process with code 0.
;                    A supervisor configured with Restart=on-failure (systemd)
;                    or --restart on-failure (Docker) will NOT restart it.
;                    A supervisor configured with Restart=always WILL restart it.
;   !admin restart - exits the server process with code 1.
;                    A supervisor configured with Restart=on-failure (systemd)
;                    or --restart on-failure (Docker) WILL restart it.
;
;   IMPORTANT: Use Restart=on-failure (not Restart=always) if you want !admin
;   stop to keep the server off until you manually bring it back.
;
; Available commands (replace !admin with your chosen prefix):
;   !admin start         - confirms the server is already online (no-op)
;   !admin stop          - gracefully stops the server (exits with code 0)
;   !admin restart       - gracefully restarts the server (exits with code 1,
;                          triggering an on-failure restart by the process supervisor)
;   !admin ticket-panel  - posts the ticket panel (permission controlled
;                          separately via TicketNotifyRoleId in DefaultTickets.ini)
;
; Set to an empty string to disable the entire command group.
; Default: !admin
; Example (custom prefix): ServerControlCommandPrefix=!manage
ServerControlCommandPrefix=!admin

; Discord role ID whose members are allowed to run server control commands
; (start, stop, restart).  When this is empty (the default), ALL control
; commands are disabled for every Discord user until a non-empty role ID is
; provided.
; IMPORTANT: Grant this role only to administrators you fully trust, as it
; allows them to shut down or restart the live server from Discord.
;
; NOTE: The Discord server owner always has permission to use these commands
; regardless of this setting, as they have inherent authority over their server.
;
; NOTE: The "!admin ticket-panel" sub-command is controlled separately by
; TicketNotifyRoleId in DefaultTickets.ini.  Members of that role can post the
; ticket panel without needing this server control role.
;
; How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: ServerControlCommandRoleId=123456789012345678
ServerControlCommandRoleId=
