[AccessTransformers]
; Allow FDiscordBridgeModule to access private members of UFGLocalPlayer so that
; SUBSCRIBE_METHOD can directly patch UFGLocalPlayer::RequestPublicPlayerAddress.
; This replaces the HTTP-layer interception workaround in DiscordBridge.cpp with a
; targeted hook on the specific private function that fires the ipify.org request.
Friend=(Class="UFGLocalPlayer", FriendClass="FDiscordBridgeModule")

