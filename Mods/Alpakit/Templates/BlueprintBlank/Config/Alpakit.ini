; Alpakit build-target configuration for CSS UnrealEngine dedicated-server builds.
;
; All three targets are required to support every Satisfactory deployment type:
;   Windows       – Windows listen-server / client hosts (FactoryGame target).
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).
;
; CSS custom UnrealEngine uses a different binary layout than stock UE for server
; targets.  Declaring all three targets here ensures Alpakit packages the mod
; with binaries for every dedicated-server platform Satisfactory supports.

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
