; Alpakit build-target configuration for EOSSystem.
;
; EOSSystem is a standalone server-side EOS integration mod.  It must be
; packaged for every server platform so that BanSystem and other dependent
; mods can resolve EOS Product User IDs and enforce EOS-based bans.
;
; RequiredOnRemote=false — players do not need to install this mod.
; Runs on:
;   Windows       — Windows listen-server hosts.
;   WindowsServer — Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   — Linux dedicated server (FactoryServer target, Linux+Server).

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
