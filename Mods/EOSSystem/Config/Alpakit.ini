; Alpakit build-target configuration for EOSSystem.
;
; EOSSystem is a server-only mod that wraps the raw EOS C SDK to provide
; Connect / PUID lookups, Sanctions, Sessions, AntiCheat, Metrics, and Reports
; for the BanSystem and any other mod that needs direct EOS access.
; RequiredOnRemote=false – players do not need to install this plugin.
; Runs on:
;   Windows       – Windows listen-server hosts.
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
