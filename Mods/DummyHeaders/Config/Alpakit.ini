; Alpakit build-target configuration for DummyHeaders.
;
; DummyHeaders is a server-only compile-time support plugin that provides
; stub/proxy headers for FactoryGame types used by BanSystem, DiscordBridge,
; SMLWebSocket, and TicketSystem.  It must be packaged for every platform
; that any of those mods targets.
;
; RequiredOnRemote=false – players do not need to install this plugin.
; Runs on:
;   Windows       – Windows listen-server hosts.
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
