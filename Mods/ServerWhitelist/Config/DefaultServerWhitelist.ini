[ServerWhitelist]
; ==============================================================================
; ServerWhitelist – Configuration
; ==============================================================================
;
; Standalone server whitelist for Satisfactory dedicated servers.
; No Discord bot is required.  The whitelist is enforced at player login and
; managed via in-game chat commands typed by players listed in AdminPlayerNames.
;
; QUICK SETUP
; -----------
;  1. Set WhitelistEnabled=True to activate the whitelist.
;  2. Add each in-game player name that can manage the whitelist:
;       +AdminPlayerNames=YourIngameName
;  3. Add each player allowed to join the server:
;       +WhitelistedPlayers=FriendName
;     OR start the server and use in-game commands (see below).
;  4. (Optional) Customise WhitelistKickReason and InGameCommandPrefix.
;  5. Restart the server.
;
; IN-GAME COMMANDS  (type in Satisfactory in-game chat as an admin)
; -----------------------------------------------------------------
;   !whitelist on                   – enable the whitelist
;   !whitelist off                  – disable the whitelist
;   !whitelist add <PlayerName>     – add a player to the whitelist
;   !whitelist remove <PlayerName>  – remove a player from the whitelist
;   !whitelist list                 – show all whitelisted players
;   !whitelist status               – show whether the whitelist is on/off
;
; PLAYER LIST PERSISTENCE
; -----------------------
;  The player list is stored in:
;    <ServerRoot>/FactoryGame/Saved/ServerWhitelist.json
;  Changes made through in-game commands are saved immediately and survive
;  server restarts.  You can also edit the JSON file directly while the server
;  is stopped.
;
; COMPATIBILITY WITH DISCORDBRIDGE
; ---------------------------------
;  When DiscordBridge is installed alongside this mod, ServerWhitelist defers
;  whitelist enforcement entirely to DiscordBridge.  Both mods share the same
;  ServerWhitelist.json file, so the player list is always in sync.
;  In that case, manage the whitelist via DiscordBridge's !whitelist commands
;  in Discord – the in-game commands here become a no-op.
;
; ==============================================================================

; Master on/off switch for the whitelist.
; When True, only players listed in ServerWhitelist.json (or +WhitelistedPlayers=
; below) are allowed to join.  When False, all players can join freely.
; Default: False
WhitelistEnabled=False

; Message shown to the kicked player in their "Disconnected" screen.
; Default: "You are not on this server's whitelist. Contact the server admin to be added."
WhitelistKickReason=You are not on this server's whitelist. Contact the server admin to be added.

; Prefix that triggers whitelist management commands when typed in the
; Satisfactory in-game chat by an admin listed in AdminPlayerNames.
; Set to empty to disable all in-game whitelist commands.
; Default: !whitelist
InGameCommandPrefix=!whitelist

; ---------------------------------------------------------------------------
; Admin player names
; ---------------------------------------------------------------------------
; Add each in-game player name that is allowed to run !whitelist commands.
; Comparison is case-insensitive.
; Add one line per admin.  Example:
;   +AdminPlayerNames=Alice
;   +AdminPlayerNames=Bob
;
; IMPORTANT: These are in-game display names, not Steam or EOS IDs.
; A determined player COULD change their name to match an admin's name, so
; treat this as a convenience feature rather than a security boundary.
; For production servers, use DiscordBridge's role-based whitelist management
; which requires the player to hold a Discord role you control.

; ---------------------------------------------------------------------------
; Initial whitelist entries  (applied only when ServerWhitelist.json does not
; yet exist – i.e. on the very first server start after installing this mod)
; ---------------------------------------------------------------------------
; You can pre-populate the whitelist here.  Once ServerWhitelist.json exists,
; changes to +WhitelistedPlayers= lines are ignored (the JSON is authoritative).
; To reset the player list, delete ServerWhitelist.json and restart the server.
; Add one line per player.  Example:
;   +WhitelistedPlayers=Alice
;   +WhitelistedPlayers=Bob
