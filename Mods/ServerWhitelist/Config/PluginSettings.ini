[StageSettings]
+AdditionalNonUSFDirectories=Config
# DefaultServerWhitelist.ini is user-editable runtime configuration.
# Excluding it from the package prevents mod updates from overwriting a server
# operator's configured file.  The mod creates this file automatically on the
# first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultServerWhitelist.ini
