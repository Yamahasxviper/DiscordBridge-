; Alpakit build-target configuration for ServerWhitelist.
;
; ServerWhitelist is a standalone server-side whitelist mod.
; It runs without DiscordBridge or any Discord bot.
; RequiredOnRemote=false – players do not need to install this mod.
; Runs on:
;   Windows       – Windows listen-server hosts.
;   WindowsServer – Windows dedicated server (FactoryServer target, Win64+Server).
;   LinuxServer   – Linux dedicated server (FactoryServer target, Linux+Server).

[ModTargets]
+Targets=Windows
+Targets=WindowsServer
+Targets=LinuxServer
