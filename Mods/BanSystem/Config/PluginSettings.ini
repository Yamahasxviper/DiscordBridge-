[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
# DefaultBanSystem.ini is user-editable runtime configuration (contains
# database path, REST API port, and backup settings).  Excluding it from the
# package prevents mod updates from overwriting a server operator's configured
# file.  Override settings by placing your values in
# Saved/Config/<Platform>/BanSystem.ini instead.
+ExcludedNonUSFFiles=Config/DefaultBanSystem.ini
