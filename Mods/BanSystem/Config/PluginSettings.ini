[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
; DefaultBanSystem.ini is user-editable runtime configuration.
; Excluding it from the package prevents mod updates from overwriting a
; server operator's settings.  The mod writes defaults on first start.
+ExcludedNonUSFFiles=Config/DefaultBanSystem.ini
