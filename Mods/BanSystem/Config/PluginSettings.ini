[StageSettings]
+AdditionalNonUSFDirectories=Config
# DefaultBanSystem.ini is user-editable runtime configuration (contains
# bot credentials and channel IDs).  Excluding it from the package prevents
# mod updates from overwriting a server operator's configured file.  The mod
# creates the file automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultBanSystem.ini
# Ban data (SteamBans.json, EOSBans.json) and automatic backups are stored
# under <ProjectSaved>/BanSystem/ which is entirely outside the mod package.
# Alpakit mod updates never touch the Saved/ directory, so ban records and
# their rolling backups (Saved/BanSystem/Backups/) survive every mod update
# without any additional Alpakit exclusion rules.

