[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
# DefaultBanSystem.ini is user-readable documentation with comment lines.
# Excluding it from the package prevents Alpakit's staging step from
# processing it through the UE config cache, which strips all comment lines.
# The mod recreates the annotated file at runtime if it is missing or
# comment-free.
+ExcludedNonUSFFiles=Config/DefaultBanSystem.ini
