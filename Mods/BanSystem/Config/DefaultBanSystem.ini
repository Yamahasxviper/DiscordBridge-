; BanSystem configuration.
;
; Settings in this file are read automatically by UBanSystemConfig
; (UCLASS Config=BanSystem).
;
; ── How to persist settings across mod updates ───────────────────────────────
;
; This file ships with the mod and may be replaced when you update BanSystem.
; To keep your settings permanently, place your overrides in ONE of:
;
;   1. Saved/BanSystem/BanSystem.ini          <- written by BanSystem on every
;                                                start; survives mod directory wipes
;   2. Saved/Config/<Platform>/BanSystem.ini  <- standard UE config override path
;
; Both use the same [/Script/BanSystem.BanSystemConfig] section header.
; Restart the server after editing any config file.
;
; Example override file contents:
;
;   [/Script/BanSystem.BanSystemConfig]
;   DatabasePath=/data/satisfactory/bans.json
;   RestApiPort=3001
;   MaxBackups=10

[/Script/BanSystem.BanSystemConfig]

; ── Database ──────────────────────────────────────────────────────────────────
;
; Absolute path to the JSON ban database file.
; Leave empty to use the default location: <ProjectSaved>/BanSystem/bans.json
;
; Default resolved paths by OS:
;   Windows: C:\SatisfactoryServer\FactoryGame\Saved\BanSystem\bans.json
;   Linux:   /home/<user>/.config/Epic/FactoryGame/Saved/BanSystem/bans.json
;
; The parent directory is created automatically if it does not exist.
; A second file (player_sessions.json) is stored in the same directory as an
; audit log of all player UIDs and display names seen at join time.
DatabasePath=

; ── REST Management API ───────────────────────────────────────────────────────
;
; Port for the local HTTP management API (default: 3000).
; The API binds to all interfaces (0.0.0.0) -- restrict external access with
; your server firewall.  The API has no authentication.
;
; Endpoints: GET /health, GET /bans, GET /bans/all, GET /bans/check/:uid,
;            POST /bans, DELETE /bans/:uid, DELETE /bans/id/:id,
;            POST /bans/prune, POST /bans/backup
;
; Set to 0 to disable the REST API entirely.
RestApiPort=3000

; ── Backup ────────────────────────────────────────────────────────────────────
;
; Maximum number of timestamped backup files to keep (default: 5).
; Backups are created on demand via POST /bans/backup on the REST API.
; When this limit is reached the oldest backup is deleted automatically.
; Backups are stored alongside bans.json as bans_YYYY-MM-DD_HH-MM-SS.json.
MaxBackups=5

; ── Warning Decay ─────────────────────────────────────────────────────────────
;
; Number of days after which warnings are considered "decayed" and excluded from
; automatic escalation checks (default: 0 = warnings never decay).
; When non-zero, GetWarningCount() ignores warnings older than WarnDecayDays days.
; Old warnings are NOT deleted — they remain in the history for audit purposes.
; Set to 0 to count all warnings regardless of age (original behaviour).
WarnDecayDays=0
