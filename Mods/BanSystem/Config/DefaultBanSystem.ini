; BanSystem Discord Notification Configuration
; ─────────────────────────────────────────────────────────────────────────────
; This file configures the optional Discord notification bridge.
; Notifications are only sent if:
;   1. BanNotificationChannelId is set to a valid Discord channel snowflake ID.
;   2. A mod implementing IBanDiscordNotificationProvider (e.g. DiscordBridge)
;      is installed and registers itself via
;        USteamBanSubsystem::SetNotificationProvider()
;        UEOSBanSubsystem::SetNotificationProvider()
;
; Supported placeholders in message templates:
;   %PlayerId%  — Steam64 ID or EOS Product User ID
;   %Reason%    — Ban reason
;   %BannedBy%  — Admin who issued the ban
; ─────────────────────────────────────────────────────────────────────────────

[BanSystem.BanDiscordConfig]

; Discord channel snowflake ID to post ban/unban messages in.
; Leave empty (default) to disable Discord notifications.
BanNotificationChannelId=

; Uncomment and edit the lines below to override the default message templates.
;SteamBanMessage=:hammer: **Steam Ban** | `%PlayerId%` banned by `%BannedBy%`. Reason: %Reason%
;SteamUnbanMessage=:white_check_mark: **Steam Unban** | `%PlayerId%` has been unbanned.
;EOSBanMessage=:hammer: **EOS Ban** | `%PlayerId%` banned by `%BannedBy%`. Reason: %Reason%
;EOSUnbanMessage=:white_check_mark: **EOS Unban** | `%PlayerId%` has been unbanned.
