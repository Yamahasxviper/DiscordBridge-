; BanSystem configuration.
;
; Settings in this file are read automatically by UBanSystemConfig
; (UCLASS Config=BanSystem).
;
; ── How to persist settings across mod updates ───────────────────────────────
;
; This file ships with the mod and may be replaced when you update BanSystem.
; To keep your settings permanently, place your overrides in ONE of:
;
;   1. Saved/BanSystem/BanSystem.ini          <- written by BanSystem on every
;                                                start; survives mod directory wipes
;   2. Saved/Config/<Platform>/BanSystem.ini  <- standard UE config override path
;
; Both use the same [/Script/BanSystem.BanSystemConfig] section header.
; Restart the server after editing any config file.
;
; Example override file contents:
;
;   [/Script/BanSystem.BanSystemConfig]
;   DatabasePath=/data/satisfactory/bans.json
;   RestApiPort=3001
;   MaxBackups=10

[/Script/BanSystem.BanSystemConfig]

; ── Database ──────────────────────────────────────────────────────────────────
;
; Absolute path to the JSON ban database file.
; Leave empty to use the default location: <ProjectSaved>/BanSystem/bans.json
;
; Default resolved paths by OS:
;   Windows: C:\SatisfactoryServer\FactoryGame\Saved\BanSystem\bans.json
;   Linux:   /home/<user>/.config/Epic/FactoryGame/Saved/BanSystem/bans.json
;
; The parent directory is created automatically if it does not exist.
; A second file (player_sessions.json) is stored in the same directory as an
; audit log of all player UIDs and display names seen at join time.
DatabasePath=

; ── REST Management API ───────────────────────────────────────────────────────
;
; Port for the local HTTP management API (default: 3000).
; The API binds to all interfaces (0.0.0.0) -- restrict external access with
; your server firewall.  The API has no authentication.
;
; Endpoints: GET /health, GET /bans, GET /bans/all, GET /bans/check/:uid,
;            POST /bans, DELETE /bans/:uid, DELETE /bans/id/:id,
;            POST /bans/prune, POST /bans/backup
;
; Set to 0 to disable the REST API entirely.
RestApiPort=3000

; ── Backup ────────────────────────────────────────────────────────────────────
;
; Maximum number of timestamped backup files to keep (default: 5).
; Backups are created on demand via POST /bans/backup on the REST API.
; When this limit is reached the oldest backup is deleted automatically.
; Backups are stored alongside bans.json as bans_YYYY-MM-DD_HH-MM-SS.json.
MaxBackups=5

; ── Warning Decay ─────────────────────────────────────────────────────────────
;
; Number of days after which warnings are considered "decayed" and excluded from
; automatic escalation checks (default: 0 = warnings never decay).
; When non-zero, GetWarningCount() ignores warnings older than WarnDecayDays days.
; Old warnings are NOT deleted — they remain in the history for audit purposes.
; Set to 0 to count all warnings regardless of age (original behaviour).
WarnDecayDays=0

; ── REST API Authentication ───────────────────────────────────────────────────
;
; Optional API key for authenticating mutating REST API requests (POST, DELETE, PATCH).
; When non-empty, all mutating endpoints require the header: X-Api-Key: <value>
; Read-only endpoints (GET) are never gated.
; Leave empty to disable API key authentication (default; only safe on a firewalled server).
RestApiKey=

; ── Scheduled Backup ─────────────────────────────────────────────────────────
;
; Interval in hours between automatic database backups (default: 0 = disabled).
; Set to 0 to rely solely on the manual POST /bans/backup endpoint.
BackupIntervalHours=0

; ── Discord Notifications ─────────────────────────────────────────────────────
;
; Optional Discord webhook URL for ban/unban/warn/kick notifications.
; When set, BanDiscordNotifier posts an embed to this URL whenever a ban is
; created or removed, a warning is issued, or a player is kicked.
; Leave empty to disable Discord notifications (default).
DiscordWebhookUrl=

; When true, post a Discord notification when a temporary ban expires (default: false).
; Only has an effect when DiscordWebhookUrl is set.
bNotifyBanExpired=False

; ── Auto-ban on Warnings ──────────────────────────────────────────────────────
;
; Number of warnings before an automatic permanent ban is issued (default: 0 = disabled).
; When a player reaches this many warnings via /warn, they are automatically
; permanently banned with reason "Auto-banned: reached warning threshold".
; Set to 0 to disable. Use WarnEscalationTiers below for multi-tier escalation.
AutoBanWarnCount=0
;
; Duration in minutes for the auto-ban issued when AutoBanWarnCount is reached (default: 0 = permanent).
; Set to 0 for a permanent auto-ban.
AutoBanWarnMinutes=0

; ── Warning Escalation Tiers ─────────────────────────────────────────────────
;
; Multi-tier automatic bans based on warning count or accumulated warning points.
; Each tier: +WarnEscalationTiers=(WarnCount=<N>,PointThreshold=<P>,DurationMinutes=<M>)
; DurationMinutes=0 means permanent ban. PointThreshold=0 uses plain warn count.
; Example:
;   +WarnEscalationTiers=(WarnCount=2,PointThreshold=0,DurationMinutes=30)
;   +WarnEscalationTiers=(WarnCount=3,PointThreshold=0,DurationMinutes=1440)
;   +WarnEscalationTiers=(WarnCount=5,PointThreshold=0,DurationMinutes=0)

; ── Session Retention ────────────────────────────────────────────────────────
;
; Number of days to retain player session records (default: 0 = keep forever).
; Records older than this value are pruned by POST /players/prune.
; Set to 0 to keep all records.
SessionRetentionDays=0

; ── Auto-Prune ───────────────────────────────────────────────────────────────
;
; Interval in hours between automatic expired-ban prune runs (0 = disabled).
; Set to 0 to rely solely on the manual POST /bans/prune endpoint.
PruneIntervalHours=0

; ── WebSocket Push Events ────────────────────────────────────────────────────
;
; When true, BanSystem pushes live JSON events to WebSocketPushUrl via SMLWebSocket.
bPushEventsToWebSocket=False
; WebSocket endpoint URL to push events to (requires SMLWebSocket mod).
WebSocketPushUrl=

; ── Ban Templates (quick-ban presets) ────────────────────────────────────────
;
; Presets for /qban <slug> [reason]. Format: +BanTemplates=slug|DurationMinutes|Reason[|Category]
; DurationMinutes=0 means permanent.
; Example:
;   +BanTemplates=griefing|10080|Griefing — destroying other players' builds|griefing
;   +BanTemplates=cheating|0|Cheating — use of third-party tools|cheating

; ── Kick Message Templates ────────────────────────────────────────────────────
;
; Custom message shown to permanently banned players. Supports {reason}, {appeal_url}.
; Leave empty to use the built-in default message.
BanKickMessageTemplate=
;
; Custom message shown to temporarily banned players. Supports {reason}, {expiry}, {appeal_url}.
; Leave empty to use the built-in default message.
TempBanKickMessageTemplate=
;
; URL included as {appeal_url} in ban kick messages.
; Example: AppealUrl=http://myserver.com:3000/appeals/portal
AppealUrl=

; ── Multi-Server Ban Sync ─────────────────────────────────────────────────────
;
; WebSocket endpoint URLs of peer servers to synchronise bans with.
; Example: +PeerWebSocketUrls=ws://server2.example.com:9000/events

; ── Admin Action Rate Limiting ────────────────────────────────────────────────
;
; Maximum ban actions an admin may issue within AdminBanRateLimitMinutes (0 = disabled).
AdminBanRateLimitCount=0
; Rolling window in minutes for the admin ban rate limiter (default: 5).
AdminBanRateLimitMinutes=5

; ── Chat-Pattern Auto-Warn ────────────────────────────────────────────────────
;
; Chat-filter hits within ChatFilterAutoWarnWindowMinutes that auto-warn a player (0 = disabled).
ChatFilterAutoWarnThreshold=0
; Rolling window in minutes for the chat-filter auto-warn counter (default: 10).
ChatFilterAutoWarnWindowMinutes=10

; ── Geo-IP Region Blocking ────────────────────────────────────────────────────
;
; When true, GeoIP lookups are performed at player login. Default: false.
bGeoIpEnabled=False
; GeoIP API URL. {ip} is replaced with the connecting player's IP address.
; Example: GeoIpApiUrl=http://ip-api.com/json/{ip}?fields=countryCode
GeoIpApiUrl=
; ISO 3166-1 alpha-2 allowlist. Takes priority over BlockedCountryCodes when non-empty.
; Example: +AllowedCountryCodes=US
; ISO 3166-1 alpha-2 blocklist (used when AllowedCountryCodes is empty).
; Example: +BlockedCountryCodes=XX
; Message shown to Geo-IP-kicked players. Supports {country}.
GeoIpKickMessage=
