[BanSystem]
# BanSystem - Discord Integration Configuration
# =============================================
# These settings control BanSystem's Discord command interface.
# Requires DiscordBridge (or another IBanDiscordCommandProvider mod) to be installed.
# This file is NOT overwritten by mod updates, so your settings persist.
#
# -- CHANNEL & AUTHORISATION --------------------------------------------------
#
# Snowflake ID of the Discord channel where BanSystem commands are accepted.
# Leave empty to disable all BanSystem Discord commands.
# This can be the same channel as DiscordBridge's ChannelId, or a dedicated
# admin-only channel.  Command responses are sent back to this same channel.
# How to get it: enable Developer Mode in Discord (User Settings -> Advanced ->
# Developer Mode), right-click the target channel, "Copy Channel ID".
DiscordChannelId=

# Snowflake ID of the Discord role whose members are allowed to run BanSystem
# Discord commands (!steamban, !eosban, !steamunban, !eosunban, etc.).
# The guild owner can always run these commands regardless of this setting.
# Leave empty to restrict access to the guild owner only.
# How to get it: Discord Settings -> Advanced -> Developer Mode, then
# right-click the role in Server Settings -> Roles -> Copy Role ID.
DiscordCommandRoleId=

# -- COMMAND PREFIXES ---------------------------------------------------------
# Set any prefix to an empty string to disable that specific command.
# The default prefixes mirror the in-game chat command names for consistency.

# Ban/unban a player by Steam64 ID or in-game name.
# Syntax: !steamban <Steam64Id|PlayerName> [duration_minutes] [reason]
# duration_minutes = 0 (or omitted) for a permanent ban.
# Examples:
#   !steamban 76561198000000000
#   !steamban 76561198000000000 0 Cheating
#   !steamban 76561198000000000 1440 Toxic behaviour
#   !steamban SomePlayer 60 Spamming
SteamBanCommandPrefix=!steamban

# Remove a Steam ban by Steam64 ID.
# Syntax: !steamunban <Steam64Id>
SteamUnbanCommandPrefix=!steamunban

# List all active Steam bans with reasons and expiry dates.
# Syntax: !steambanlist
SteamBanListCommandPrefix=!steambanlist

# Ban/unban a player by EOS Product User ID (32-char hex) or in-game name.
# Syntax: !eosban <EOSProductUserId|PlayerName> [duration_minutes] [reason]
# Examples:
#   !eosban 00020aed06f0a6958c3c067fb4b73d51
#   !eosban SomePlayer 60 Spam
EOSBanCommandPrefix=!eosban

# Remove an EOS ban by EOS Product User ID.
# Syntax: !eosunban <EOSProductUserId>
EOSUnbanCommandPrefix=!eosunban

# List all active EOS bans with reasons and expiry dates.
# Syntax: !eosbanlist
EOSBanListCommandPrefix=!eosbanlist

# Ban a currently-connected player by in-game name on ALL available platforms
# simultaneously (applies both a Steam ban and an EOS ban if both IDs exist).
# Syntax: !banbyname <PlayerName> [duration_minutes] [reason]
# Examples:
#   !banbyname SomePlayer
#   !banbyname SomePlayer 0 Cheating
#   !banbyname SomePlayer 60 Spam during event
BanByNameCommandPrefix=!banbyname

# List the Steam64 and/or EOS Product User IDs of all connected players,
# or of a specific player when a name filter is provided.
# Syntax: !playerids [PlayerName]
# Examples:
#   !playerids
#   !playerids SomePlayer
PlayerIdsCommandPrefix=!playerids

# -- RESPONSE MESSAGE FORMATS -------------------------------------------------
# Customise the Discord messages posted after each command succeeds.
# Leave empty to use the built-in defaults shown in the comments below.
# Available placeholders:
#   %PlayerId%  – the Steam64 ID or EOS Product User ID
#   %Reason%    – the ban reason string
#   %BannedBy%  – the Discord display name of the admin who issued the ban
#   %Duration%  – "permanently" or "X minute(s)"

# Default: :hammer: **BanSystem** - Steam ID `%PlayerId%` banned by **%BannedBy%** (%Duration%) - Reason: %Reason%
SteamBanResponseMessage=

# Default: :white_check_mark: **BanSystem** - Steam ID `%PlayerId%` has been unbanned.
SteamUnbanResponseMessage=

# Default: :hammer: **BanSystem** - EOS ID `%PlayerId%` banned by **%BannedBy%** (%Duration%) - Reason: %Reason%
EOSBanResponseMessage=

# Default: :white_check_mark: **BanSystem** - EOS ID `%PlayerId%` has been unbanned.
EOSUnbanResponseMessage=
