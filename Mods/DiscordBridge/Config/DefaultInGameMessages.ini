[InGameMessages]
# DiscordBridge - In-Game Broadcast Messages
# ==========================================
# Scheduled messages that the bot broadcasts to in-game chat on a timer.
# Add as many +Messages entries as you like - each one runs on its own
# independent timer.  Messages can contain web links, server invite links,
# and emoji characters (Unicode or copy-paste from Discord).
#
# Note: this file is NOT overwritten by mod updates, so your messages persist
#   across version upgrades. A backup is written automatically to
#   <ServerRoot>/FactoryGame/Saved/DiscordBridge/InGameMessages.ini
#   on every server start so messages survive primary file deletion.
# To apply changes: restart the server (or delete this file to regenerate it).

# -- SETTINGS -----------------------------------------------------------------

Enabled=True
# Master switch — set to False to disable all scheduled in-game messages.

DefaultSenderName=[Server]
# Default sender name shown in chat when a message entry omits SenderName.

# -- MESSAGE FORMAT -----------------------------------------------------------

# Each +Messages entry has three fields:
#   IntervalMinutes  - How often (in minutes) this message is sent. Required.
#   SenderName       - Name shown in chat (e.g. "[Server]"). Optional, uses DefaultSenderName.
#   Message          - The text to broadcast. Required. Supports:
#                      - Web links:    https://example.com
#                      - Discord links: https://discord.gg/yourserver
#                      - Emoji:        Copy-paste Unicode emoji directly

# -- EXAMPLES -----------------------------------------------------------------

# Add your messages below. Uncomment and edit the examples, or add your own.
# Each message runs on its own independent timer.
#
# +Messages=(IntervalMinutes=15,SenderName="[Server]",Message="Welcome! Check the rules at https://example.com/rules")
# +Messages=(IntervalMinutes=30,SenderName="[Admin]",Message="Join our Discord: https://discord.gg/yourserver")
# +Messages=(IntervalMinutes=60,Message="Remember to save your game!")
