[DiscordBridge]
# DiscordBridge - Primary Configuration File
# ===========================================
# 1. Set BotToken and ChannelId below.
# 2. Restart the server. The bridge starts automatically.
# Note: this file is NOT overwritten by mod updates, so your settings persist
#   across version upgrades. A backup is still written automatically to
#   <ServerRoot>/FactoryGame/Saved/DiscordBridge/DiscordBridge.ini on every server start.
# Bot setup: Discord Developer Portal -> your app -> Bot
#   - Enable Server Members and Message Content intents.
#   - Invite the bot with Send Messages + Read Message History permissions.
#   - Enable Developer Mode in Discord, right-click the channel, Copy Channel ID.

# -- CONNECTION ---------------------------------------------------------------

# Discord bot token (Bot -> Token in Developer Portal). Treat this like a
# password – never share it or commit it to source control. The bridge will
# not start if this is empty.
# How to get it: Discord Developer Portal -> your app -> Bot -> Reset Token.
BotToken=

# Snowflake ID of the Discord text channel to bridge with in-game chat.
# Must be a numeric ID, e.g. 123456789012345678.
# How to get it: enable Developer Mode in Discord (User Settings -> Advanced ->
# Developer Mode), then right-click the target channel and choose Copy Channel ID.
ChannelId=

# Display name for this server. Used as the %ServerName% placeholder in message
# format strings and the player-count presence text. Leave empty to omit the
# server label from those strings.
# Example: ServerName=My Satisfactory Server
ServerName=

# -- CHAT CUSTOMISATION -------------------------------------------------------

# Format string applied when an in-game player message is forwarded to Discord.
# Available placeholders:
#   %ServerName%  – value of the ServerName setting above
#   %PlayerName%  – the in-game name of the player who sent the message
#   %Message%     – the raw chat message text
# Discord markdown (bold, italics, code blocks, etc.) is supported.
# Default: **%PlayerName%**: %Message%
# Example (include server label): **[%ServerName%] %PlayerName%**: %Message%
GameToDiscordFormat=

# Format string used for the complete line shown in the Satisfactory in-game chat
# when a Discord message is relayed into the game.
# Available placeholders:
#   %Username%    – the Discord display name of the sender
#   %PlayerName%  – alias for %Username%
#   %Message%     – the Discord message text
#   %Role%        – the highest-priority role label resolved from DiscordRoleLabels
#                   (empty string when the sender holds none of the listed roles)
# Default: [Discord] %Username%: %Message%
# Example (show role): [Discord] [%Role%] %Username%: %Message%
DiscordToGameFormat=

# Role ID to label mappings that resolve the %Role% placeholder above.
# See the "DISCORD ROLE LABELS" section near the bottom of this file.

# -- BEHAVIOUR ----------------------------------------------------------------

# When True, messages posted by other bots are ignored and not relayed to the
# game. This prevents echo loops when multiple bots share the same channel.
# Set to False only if you intentionally want bot messages forwarded in-game.
# Default: True
IgnoreBotMessages=

# -- SERVER STATUS MESSAGES ---------------------------------------------------

# Master on/off switch for server status messages (online/offline notifications).
# Set to False to disable all online/offline notifications globally.
# Default: True
ServerStatusMessagesEnabled=True

# Snowflake ID of a dedicated Discord channel for server status messages.
# When set, online/offline notifications are posted to this channel instead of
# the main bridged channel (ChannelId), keeping status updates separate from chat.
# Leave empty to post status messages to the main bridged channel (ChannelId).
# How to get it: enable Developer Mode in Discord, right-click the channel,
# choose Copy Channel ID.
# Example: StatusChannelId=111222333444555666777
StatusChannelId=

# Message posted to the bridged Discord channel when the server finishes starting
# up. Leave empty (delete the text after the =) to disable this notification.
# Discord emoji shortcodes such as :green_circle: are supported.
ServerOnlineMessage=:green_circle: Server is now **online**!

# Message posted to the bridged Discord channel when the server shuts down.
# Leave empty to disable this notification.
ServerOfflineMessage=:red_circle: Server is now **offline**.

# -- PLAYER COUNT PRESENCE ----------------------------------------------------

# When True, the bot's Discord status (the "Now Playing" activity line visible
# on the bot's profile) is updated periodically to show the live player count.
# Set to False to leave the bot status blank.
# Default: True
ShowPlayerCountInPresence=

# Text shown in the bot's Discord presence activity line.
# Available placeholders:
#   %PlayerCount%  – the current number of players on the server
#   %ServerName%   – value of the ServerName setting above
# Default: Satisfactory with %PlayerCount% players
# Example (show server name): %ServerName% – %PlayerCount% online
PlayerCountPresenceFormat=

# How often (in seconds) to refresh the player count shown in the bot's presence.
# Must be at least 15 seconds (values below 15 are clamped to 15 to respect
# Discord's rate limits). Increase this if you want less frequent updates.
# Default: 60
PlayerCountUpdateIntervalSeconds=

# Controls the activity verb shown before the presence text in Discord.
# This is the word that appears in front of your PlayerCountPresenceFormat text
# on the bot's profile card.
#   0 = Playing        -> "Playing Satisfactory with 4 players"
#   2 = Listening to   -> "Listening to Satisfactory with 4 players"
#   3 = Watching       -> "Watching Satisfactory with 4 players"
#   5 = Competing in   -> "Competing in Satisfactory with 4 players"
# Default: 0 (Playing)
PlayerCountActivityType=

# -- WHITELIST ----------------------------------------------------------------
#
# Whitelist settings have been moved to a separate file for easier management:
#   Mods/DiscordBridge/Config/DefaultWhitelist.ini
# Edit that file to configure all whitelist settings.

# -- PLAYER NOTIFICATIONS ------------------------------------------------------

# Master on/off switch for player join/leave/timeout notifications.
# When True, posts a Discord message whenever a player joins, leaves, or times out.
# Default: False (disabled). Set to True to enable.
PlayerEventsEnabled=False

# Snowflake ID of a dedicated Discord channel for player join/leave/timeout
# notifications. Leave empty to post to the main bridged channel (ChannelId).
# How to get it: enable Developer Mode in Discord, right-click the channel,
# choose Copy Channel ID.
# Example: PlayerEventsChannelId=111222333444555666777
PlayerEventsChannelId=

# Message posted to Discord when a player joins the server.
# Available placeholder: %PlayerName%
# Leave empty to disable join notifications.
# Default: :green_circle: **%PlayerName%** joined the server.
PlayerJoinMessage=:green_circle: **%PlayerName%** joined the server.

# Snowflake ID of a PRIVATE admin-only Discord channel for sensitive join details.
# When set, an admin message is posted there with the EOS Product User ID and IP address
# of each joining player — information that should NOT appear in the public channel.
# Leave empty to disable admin-info notifications.
# Example: PlayerJoinAdminChannelId=111222333444555666777
PlayerJoinAdminChannelId=

# Message posted to the private admin channel when a player joins.
# Available placeholders: %PlayerName%, %EOSProductUserId%, %IpAddress%
# Only used when PlayerJoinAdminChannelId is set. Leave empty to disable.
# Default: :shield: **%PlayerName%** joined | EOS: `%EOSProductUserId%` | IP: `%IpAddress%`
PlayerJoinAdminMessage=:shield: **%PlayerName%** joined | EOS: `%EOSProductUserId%` | IP: `%IpAddress%`

# Message posted to Discord when a player leaves the server cleanly.
# Also used as a fallback for timeouts when PlayerTimeoutMessage is empty.
# Available placeholder: %PlayerName%
# Leave empty to disable leave notifications.
# Default: :red_circle: **%PlayerName%** left the server.
PlayerLeaveMessage=:red_circle: **%PlayerName%** left the server.

# Message posted to Discord when a player times out (connection lost).
# Leave empty to use PlayerLeaveMessage for timeouts instead.
# Available placeholder: %PlayerName%
# Default: :yellow_circle: **%PlayerName%** timed out.
PlayerTimeoutMessage=:yellow_circle: **%PlayerName%** timed out.

# When True, player join/leave/timeout events are sent as colour-coded Discord
# embeds (green for join, red for leave, orange for timeout) instead of plain
# text messages.
# Default: False
UseEmbedsForPlayerEvents=False

# When True, the bot adds thumbs-up and thumbs-down reactions to the player-join
# embed/message so that Discord members can vote on new arrivals.
# Requires the bot to have "Add Reactions" and "Read Message History" permissions
# in the player-events channel.
# Default: False
EnableJoinReactionVoting=False

# Number of thumbs-down reactions required within VoteWindowMinutes to automatically
# kick the newly-joined player. Set to 0 to disable automatic kick (vote tracking
# only, no action taken).
# Default: 0
VoteKickThreshold=0

# Number of minutes to watch for thumbs-down reactions before the vote expires.
# Only used when EnableJoinReactionVoting is True.
# Default: 5
VoteWindowMinutes=5

# -- GAME EVENT CHANNELS ------------------------------------------------------

# Snowflake ID of the Discord channel where game phase change announcements are
# posted (e.g. entering Tier 3, starting Phase 2). Leave empty to post to the
# main bridged channel (ChannelId).
# Example: PhaseEventsChannelId=111222333444555666777
PhaseEventsChannelId=

# When True, game-phase change notifications are sent as rich Discord embeds
# (colour-coded, with title and description). When False, they are sent as
# plain text messages. Only has an effect when PhaseEventsChannelId is set.
# Default: True
UseEmbedsForPhaseEvents=True

# Snowflake ID of the Discord channel where schematic/research unlock
# announcements are posted. Leave empty to post to PhaseEventsChannelId,
# or to ChannelId when that is also empty.
# Example: SchematicEventsChannelId=111222333444555666777
SchematicEventsChannelId=

# When True, schematic-unlock notifications are sent as rich Discord embeds.
# When False, they are sent as plain text messages. Only has an effect when
# SchematicEventsChannelId is set.
# Default: True
UseEmbedsForSchematicEvents=True

# Snowflake ID of the Discord channel where ban notifications are posted.
# Leave empty to post to the main DiscordWebhookUrl used by BanSystem.
# Example: BanEventsChannelId=111222333444555666777
BanEventsChannelId=

# -- ON-JOIN DIRECT MESSAGE ---------------------------------------------------

# DM message sent directly to a player the first time they join the server.
# The bot looks up the joining player's Discord user ID by matching their
# in-game name against the display names (nick / global_name / username) of
# guild members who hold the WhitelistRoleId Discord role.  If no match is
# found the DM is silently skipped.
# Leave empty (default) to disable on-join DMs.
# Available placeholder: %PlayerName% – the in-game name of the joining player.
# Example: WelcomeMessageDM=👋 Welcome to the server, **%PlayerName%**! Check #rules before you start.
WelcomeMessageDM=

# -- ON-JOIN IN-GAME HINT ----------------------------------------------------

# Message sent privately in-game to a player when they join the server. Use
# this to advertise available commands (/discord, /verify, /commands). The
# message is sent only to the joining player (not broadcast to all connected
# players). Leave empty (default) to disable the on-join hint.
# Available placeholder: %PlayerName%
# Example: JoinHintMessage=Welcome %PlayerName%! Type /discord for our Discord link.
JoinHintMessage=

# -- ON-JOIN IN-GAME BROADCAST -----------------------------------------------

# Master on/off switch for the in-game join broadcast. Set to False to disable
# the broadcast without clearing the message text below.
# Default: True
InGameJoinBroadcastEnabled=True

# Message broadcast to ALL connected players in the game chat when a new player
# joins the server. Unlike JoinHintMessage (which only the joining player sees),
# this message appears in the shared game chat so everyone can see who joined.
# Completely independent of the whitelist -- fires for every player that passes
# the join check regardless of whether the whitelist is enabled or disabled.
# Leave empty (default) to disable the broadcast.
# Available placeholder: %PlayerName%
InGameJoinBroadcast=

# -- DISCORD INVITE -----------------------------------------------------------

# Discord invite link shown to players who type /discord in the Satisfactory
# in-game chat. Leave empty to disable the /discord in-game command.
# Example: DiscordInviteUrl=https://discord.gg/yourserver
DiscordInviteUrl=

# -- BOT INFO / HELP CHANNEL -------------------------------------------------

# Snowflake ID of a dedicated Discord channel where the bot posts a comprehensive
# embed listing every feature and command when the server starts for the first
# time. Discord users can also use /help in the main bridged channel to re-post
# the embed at any time.
# Recommended: create a read-only #bot-commands channel and set its ID here.
# Leave empty to disable the automatic post (but /help still works).
# Example: BotInfoChannelId=111222333444555666777
BotInfoChannelId=

# -- BOT COMMANDS -------------------------------------------------------------

# Snowflake ID of the Discord channel where /players responses are posted.
# Leave empty to post to the main bridged channel (ChannelId).
# Example: PlayersCommandChannelId=111222333444555666777
PlayersCommandChannelId=

# -- MODERATION ---------------------------------------------------------------

# Snowflake ID of a Discord channel where mute/unmute and moderation
# notifications are posted. Falls back to BanEventsChannelId, then ChannelId.
# Example: ModeratorChannelId=111222333444555666777
ModeratorChannelId=

# When True, DiscordBridge posts a notification to the moderator channel
# whenever a player is muted or unmuted via /mute or /unmute. Only has an
# effect when the BanChatCommands mod is installed.
# Default: False
NotifyMuteEvents=False

# Snowflake ID of a Discord channel where all moderation actions (bans, kicks,
# warns, mutes, unbans, unmutes) are mirrored regardless of source.
# Leave empty to disable the unified moderation log.
# Example: ModerationLogChannelId=111222333444555666777
ModerationLogChannelId=

# -- AFK KICK -----------------------------------------------------------------

# Number of minutes of inactivity before kicking an AFK player. Inactivity is
# defined as not building anything, tracked via the statistics subsystem.
# Set to 0 to disable AFK kick entirely (default).
# Default: 0
AfkKickMinutes=0

# Reason shown to the player when they are kicked for inactivity.
# Default: Kicked for inactivity (AFK).
AfkKickReason=Kicked for inactivity (AFK).

# -- SCHEDULED ANNOUNCEMENTS --------------------------------------------------

# Interval in minutes between repeating server announcements. When non-zero,
# DiscordBridge posts AnnouncementMessage to AnnouncementChannelId (falls back
# to ChannelId) at the configured interval. Set to 0 to disable.
# Default: 0
AnnouncementIntervalMinutes=0

# The message text to post as a periodic server announcement. Discord markdown
# (bold, italics, URLs, etc.) is supported. Only used when
# AnnouncementIntervalMinutes > 0.
AnnouncementMessage=

# Channel ID to post scheduled announcements to. Falls back to ChannelId.
# Example: AnnouncementChannelId=111222333444555666777
AnnouncementChannelId=

# Multiple independent announcements with their own intervals and channels.
# Format: +ScheduledAnnouncements=(IntervalMinutes=60,Message="Rules: ...",ChannelId="")
# Each entry fires independently. These run in addition to the legacy single
# AnnouncementIntervalMinutes/AnnouncementMessage/AnnouncementChannelId above.
# Example:
#   +ScheduledAnnouncements=(IntervalMinutes=60,Message="Join our Discord!",ChannelId="")
#   +ScheduledAnnouncements=(IntervalMinutes=30,Message="Vote on maps!",ChannelId="111222333")

# -- CHAT RELAY FILTER --------------------------------------------------------

# Block in-game chat keywords from being relayed to Discord (case-insensitive).
# Any in-game message containing one of these strings is silently dropped.
# Add one keyword per line using +ChatRelayBlocklist= syntax.
# Leave empty to relay all messages (default).
# Example:
#   +ChatRelayBlocklist=spam
#   +ChatRelayBlocklist=badword

# Find-and-replace replacements for the chat relay filter. Instead of dropping
# the whole message, matching text is replaced with Replacement (default: ***).
# When a message matches both ChatRelayBlocklist (drop) and
# ChatRelayBlocklistReplacements (replace), the full-drop rule wins.
# Format: +ChatRelayBlocklistReplacements=(Pattern="badword",Replacement="***")
# Example:
#   +ChatRelayBlocklistReplacements=(Pattern="badword",Replacement="***")

# -- WEBHOOK FALLBACK ---------------------------------------------------------

# Secondary (fallback) Discord webhook URL. When non-empty and the primary bot
# send fails, DiscordBridge retries the message to this webhook URL. Useful for
# posting to a second channel or alerting a backup logging server on primary
# failure. Leave empty to disable (default).
# Example: FallbackWebhookUrl=https://discord.com/api/webhooks/...
FallbackWebhookUrl=

# -- DISCORD ROLE LABELS (for %Role% placeholder) ----------------------------

# Each line maps a Discord role snowflake ID to a display label used to resolve
# the %Role% placeholder in DiscordToGameFormat. The first matching entry (in
# list order) wins. If the sender holds none of the listed roles, %Role%
# resolves to an empty string.
# Format: +DiscordRoleLabels=roleId=Label
# Leave empty to disable role labels.
# Example:
#   +DiscordRoleLabels=123456789012345678=Admin
#   +DiscordRoleLabels=987654321098765432=Moderator

# -- SLASH COMMANDS -----------------------------------------------------------

# Set to True to register Discord application slash commands on bot startup.
# When enabled the bot will register all built-in commands as slash commands
# with your guild, enabling autocomplete and the slash-command UI in Discord.
#
# IMPORTANT – Discord Developer Portal setup required:
#   1. Go to your application → OAuth2 → URL Generator.
#   2. Tick the "applications.commands" scope in addition to "bot".
#   3. Re-invite the bot with the new URL if it was originally invited without
#      the applications.commands scope.
#
# Discord slash command groups registered when this is True:
#   /players /stats /server /online /help  (standalone public commands)
#   /ban      – permanent, temp, check, list, extend, schedule, bulk, …
#   /warn     – add, list, clearall, clearone
#   /mod      – kick, mute, unmute, announce, stafflist, staffchat, …
#   /player   – history, note, notes, playtime, stats, reputation
#   /appeal   – list, approve, deny, dismiss
#   /admin    – say, poll, reloadconfig
#   /whitelist– on, off, add, remove, list, status, apply, link, search
#   /ticket   – panel, list, assign, claim, unclaim, transfer, priority, …
#
# In-game Satisfactory chat slash commands (registered via SML, always active):
#   /verify <code>              – link your Discord account (account verification)
#   /discord                    – show the Discord server invite link
#   /ingamewhitelist <subcmd>   – manage the whitelist from in-game chat
#
# Default: False
EnableSlashCommands=True
