[DiscordBridge]
# DiscordBridge - Primary Configuration File
# ===========================================
# 1. Set BotToken and ChannelId below.
# 2. Restart the server. The bridge starts automatically.
# Note: this file is NOT overwritten by mod updates, so your settings persist
#   across version upgrades. A backup is still written automatically to
#   <ServerRoot>/FactoryGame/Saved/DiscordBridge/DiscordBridge.ini on every server start.
# Bot setup: Discord Developer Portal -> your app -> Bot
#   - Enable Server Members and Message Content intents.
#   - Invite the bot with Send Messages + Read Message History permissions.
#   - Enable Developer Mode in Discord, right-click the channel, Copy Channel ID.

# -- CONNECTION ---------------------------------------------------------------

# Discord bot token (Bot -> Token in Developer Portal). Treat this like a
# password – never share it or commit it to source control. The bridge will
# not start if this is empty.
# How to get it: Discord Developer Portal -> your app -> Bot -> Reset Token.
BotToken=

# Snowflake ID of the Discord text channel to bridge with in-game chat.
# Must be a numeric ID, e.g. 123456789012345678.
# How to get it: enable Developer Mode in Discord (User Settings -> Advanced ->
# Developer Mode), then right-click the target channel and choose Copy Channel ID.
ChannelId=

# Display name for this server. Used as the %ServerName% placeholder in message
# format strings and the player-count presence text. Leave empty to omit the
# server label from those strings.
# Example: ServerName=My Satisfactory Server
ServerName=

# -- CHAT CUSTOMISATION -------------------------------------------------------

# Format string applied when an in-game player message is forwarded to Discord.
# Available placeholders:
#   %ServerName%  – value of the ServerName setting above
#   %PlayerName%  – the in-game name of the player who sent the message
#   %Message%     – the raw chat message text
# Discord markdown (bold, italics, code blocks, etc.) is supported.
# Default: **%PlayerName%**: %Message%
# Example (include server label): **[%ServerName%] %PlayerName%**: %Message%
GameToDiscordFormat=

# Format string used for the complete line shown in the Satisfactory in-game chat
# when a Discord message is relayed into the game.
# Available placeholders:
#   %Username%    – the Discord display name of the sender
#   %PlayerName%  – alias for %Username%
#   %Message%     – the Discord message text
#   %Role%        – the highest-priority role label resolved from DiscordRoleLabels
#                   (empty string when the sender holds none of the listed roles)
# Default: [Discord] %Username%: %Message%
# Example (show role): [Discord] [%Role%] %Username%: %Message%
DiscordToGameFormat=

# Comma-style role ID → label mappings used to resolve the %Role% placeholder in
# DiscordToGameFormat.  Each line adds one entry; the first matching role (in list
# order) wins.  The sender's roles are compared against each roleId; if a match is
# found, the corresponding Label replaces %Role% in the formatted message.
# Format: +DiscordRoleLabels=roleId=Label
# Example:
#   +DiscordRoleLabels=123456789012345678=Admin
#   +DiscordRoleLabels=987654321098765432=Moderator
# Leave empty (no +DiscordRoleLabels= lines) to disable role labels.

# -- BEHAVIOUR ----------------------------------------------------------------

# When True, messages posted by other bots are ignored and not relayed to the
# game. This prevents echo loops when multiple bots share the same channel.
# Set to False only if you intentionally want bot messages forwarded in-game.
# Default: True
IgnoreBotMessages=

# -- SERVER STATUS MESSAGES ---------------------------------------------------

# Master on/off switch for server status messages (online/offline notifications).
# Set to False to disable all online/offline notifications globally.
# Default: True
ServerStatusMessagesEnabled=True

# Snowflake ID of a dedicated Discord channel for server status messages.
# When set, online/offline notifications are posted to this channel instead of
# the main bridged channel (ChannelId), keeping status updates separate from chat.
# Leave empty to post status messages to the main bridged channel (ChannelId).
# How to get it: enable Developer Mode in Discord, right-click the channel,
# choose Copy Channel ID.
# Example: StatusChannelId=111222333444555666777
StatusChannelId=

# Message posted to the bridged Discord channel when the server finishes starting
# up. Leave empty (delete the text after the =) to disable this notification.
# Discord emoji shortcodes such as :green_circle: are supported.
ServerOnlineMessage=:green_circle: Server is now **online**!

# Message posted to the bridged Discord channel when the server shuts down.
# Leave empty to disable this notification.
ServerOfflineMessage=:red_circle: Server is now **offline**.

# -- PLAYER COUNT PRESENCE ----------------------------------------------------

# When True, the bot's Discord status (the "Now Playing" activity line visible
# on the bot's profile) is updated periodically to show the live player count.
# Set to False to leave the bot status blank.
# Default: True
ShowPlayerCountInPresence=

# Text shown in the bot's Discord presence activity line.
# Available placeholders:
#   %PlayerCount%  – the current number of players on the server
#   %ServerName%   – value of the ServerName setting above
# Default: Satisfactory with %PlayerCount% players
# Example (show server name): %ServerName% – %PlayerCount% online
PlayerCountPresenceFormat=

# How often (in seconds) to refresh the player count shown in the bot's presence.
# Must be at least 15 seconds (values below 15 are clamped to 15 to respect
# Discord's rate limits). Increase this if you want less frequent updates.
# Default: 60
PlayerCountUpdateIntervalSeconds=

# Controls the activity verb shown before the presence text in Discord.
# This is the word that appears in front of your PlayerCountPresenceFormat text
# on the bot's profile card.
#   0 = Playing        -> "Playing Satisfactory with 4 players"
#   2 = Listening to   -> "Listening to Satisfactory with 4 players"
#   3 = Watching       -> "Watching Satisfactory with 4 players"
#   5 = Competing in   -> "Competing in Satisfactory with 4 players"
# Default: 0 (Playing)
PlayerCountActivityType=

# -- WHITELIST ----------------------------------------------------------------

# Controls whether the whitelist is active when the server starts.
# When True, only players listed in ServerWhitelist.json (or who hold the
# WhitelistRoleId Discord role, if configured) are allowed to join.
# When False, all players can join regardless of the whitelist.
# This value is applied on EVERY server restart - it is the authoritative
# toggle. Note: !whitelist on / !whitelist off Discord commands update the
# in-memory state for the current session only and do not override this value.
# Default: False
WhitelistEnabled=False

# Snowflake ID of the Discord role whose members are allowed to run !whitelist
# commands. When set, ONLY members who hold this role can issue !whitelist
# commands in the bridged Discord channel. When left empty, !whitelist commands
# are disabled for all Discord users (deny-by-default) until a role ID is provided.
# IMPORTANT: holding this role does NOT grant access to the game server. Role
# holders are still subject to the normal whitelist check when joining.
# How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
# right-click the role in Server Settings -> Roles -> Copy Role ID.
# Example: WhitelistCommandRoleId=123456789012345678
WhitelistCommandRoleId=

# Prefix that triggers whitelist management commands when typed in the bridged
# Discord channel. Set to an empty string to disable Discord-based whitelist
# management entirely.
# Supported commands (type in the bridged Discord channel):
#   !whitelist on                       - enable the whitelist
#   !whitelist off                      - disable the whitelist (all players can join)
#   !whitelist add <name>               - add a player by in-game name
#   !whitelist remove <name>            - remove a player by in-game name
#   !whitelist list                     - list all whitelisted players
#   !whitelist status                   - show current whitelist state
#   !whitelist role add <discord_id>    - grant the WhitelistRoleId role to a Discord user
#   !whitelist role remove <discord_id> - revoke the WhitelistRoleId role from a Discord user
# Default: !whitelist
WhitelistCommandPrefix=!whitelist

# Snowflake ID of the Discord role used to identify whitelisted members.
# Leave empty to disable Discord role integration.
# How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
# right-click the role in Server Settings -> Roles -> Copy Role ID.
# Example: WhitelistRoleId=111222333444555666
WhitelistRoleId=

# Snowflake ID of a dedicated Discord channel for whitelisted members.
# Leave empty to disable the whitelist-only channel.
# How to get the channel ID: right-click the channel in Discord with Developer
# Mode enabled -> Copy Channel ID.
# Example: WhitelistChannelId=222333444555666777
WhitelistChannelId=

# Message posted to the main Discord channel whenever a non-whitelisted player
# tries to join and is kicked. Leave empty (delete the text after the =) to
# disable this notification.
# Available placeholder:
#   %PlayerName%  - the in-game name of the player who was kicked
# Example: WhitelistKickDiscordMessage=:no_entry: **%PlayerName%** is not whitelisted and was removed.
WhitelistKickDiscordMessage=:boot: **%PlayerName%** tried to join but is not on the whitelist and was kicked.

# Text shown in-game to the player in the disconnected / kicked screen when
# they are kicked because they are not on the whitelist.
# Default: You are not on this server's whitelist. Contact the server admin to be added.
# Example: WhitelistKickReason=You are not whitelisted. DM an admin on Discord to request access.
WhitelistKickReason=

# Prefix that triggers whitelist management commands when typed in the
# Satisfactory in-game chat. Set to an empty string to disable in-game whitelist commands.
# Supported commands (type in the Satisfactory in-game chat):
#   !whitelist on            - enable the whitelist
#   !whitelist off           - disable the whitelist (all players can join)
#   !whitelist add <name>    - add a player by in-game name
#   !whitelist remove <name> - remove a player by in-game name
#   !whitelist list          - list all whitelisted players
#   !whitelist status        - show current whitelist state
# Note: in-game whitelist commands do not support role management
# (!whitelist role add/remove), which is available from Discord only.
# Default: !whitelist
InGameWhitelistCommandPrefix=!whitelist

# -- PLAYER NOTIFICATIONS ------------------------------------------------------

# Master on/off switch for player join/leave/timeout notifications.
# When True, posts a Discord message whenever a player joins, leaves, or times out.
# Default: False (disabled). Set to True to enable.
PlayerEventsEnabled=False

# Snowflake ID of a dedicated Discord channel for player join/leave/timeout
# notifications. Leave empty to post to the main bridged channel (ChannelId).
# How to get it: enable Developer Mode in Discord, right-click the channel,
# choose Copy Channel ID.
# Example: PlayerEventsChannelId=111222333444555666777
PlayerEventsChannelId=

# Message posted to Discord when a player joins the server.
# Available placeholder: %PlayerName%
# Leave empty to disable join notifications.
# Default: :green_circle: **%PlayerName%** joined the server.
PlayerJoinMessage=:green_circle: **%PlayerName%** joined the server.

# Snowflake ID of a PRIVATE admin-only Discord channel for sensitive join details.
# When set, an admin message is posted there with the EOS Product User ID and IP address
# of each joining player — information that should NOT appear in the public channel.
# Leave empty to disable admin-info notifications.
# Example: PlayerJoinAdminChannelId=111222333444555666777
PlayerJoinAdminChannelId=

# Message posted to the private admin channel when a player joins.
# Available placeholders: %PlayerName%, %EOSProductUserId%, %IpAddress%
# Only used when PlayerJoinAdminChannelId is set. Leave empty to disable.
# Default: :shield: **%PlayerName%** joined | EOS: `%EOSProductUserId%` | IP: `%IpAddress%`
PlayerJoinAdminMessage=:shield: **%PlayerName%** joined | EOS: `%EOSProductUserId%` | IP: `%IpAddress%`

# Message posted to Discord when a player leaves the server cleanly.
# Also used as a fallback for timeouts when PlayerTimeoutMessage is empty.
# Available placeholder: %PlayerName%
# Leave empty to disable leave notifications.
# Default: :red_circle: **%PlayerName%** left the server.
PlayerLeaveMessage=:red_circle: **%PlayerName%** left the server.

# Message posted to Discord when a player times out (connection lost).
# Leave empty to use PlayerLeaveMessage for timeouts instead.
# Available placeholder: %PlayerName%
# Default: :yellow_circle: **%PlayerName%** timed out.
PlayerTimeoutMessage=:yellow_circle: **%PlayerName%** timed out.

# -- ON-JOIN DIRECT MESSAGE ---------------------------------------------------

# DM message sent directly to a player the first time they join the server.
# The bot looks up the joining player's Discord user ID by matching their
# in-game name against the display names (nick / global_name / username) of
# guild members who hold the WhitelistRoleId Discord role.  If no match is
# found the DM is silently skipped.
# Leave empty (default) to disable on-join DMs.
# Available placeholder: %PlayerName% – the in-game name of the joining player.
# Example: WelcomeMessageDM=👋 Welcome to the server, **%PlayerName%**! Check #rules before you start.
WelcomeMessageDM=

# -- SLASH COMMANDS -----------------------------------------------------------

# Set to True to register Discord application slash commands on bot startup.
# When enabled the bot will register all built-in commands as slash commands
# with your guild, enabling autocomplete and the slash-command UI in Discord.
#
# IMPORTANT – Discord Developer Portal setup required:
#   1. Go to your application → OAuth2 → URL Generator.
#   2. Tick the "applications.commands" scope in addition to "bot".
#   3. Re-invite the bot with the new URL if it was originally invited without
#      the applications.commands scope.
#
# The following slash command groups are registered when this is True:
#   /players /stats /server /online /help  (standalone public commands)
#   /ban      – permanent, temp, check, list, extend, schedule, bulk, …
#   /warn     – add, list, clearall, clearone
#   /mod      – kick, mute, unmute, announce, stafflist, staffchat, …
#   /player   – history, note, notes, playtime, stats, reputation
#   /appeal   – list, approve, deny, dismiss
#   /admin    – say, poll, reloadconfig
#   /whitelist– on, off, add, remove, list, status, apply, link, search
#
# Default: False
EnableSlashCommands=True
