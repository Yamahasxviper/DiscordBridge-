[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
# DefaultDiscordBridge.ini is user-editable runtime configuration (contains
# server credentials).  Excluding it from the package prevents mod updates from
# overwriting a server operator's configured file.  The mod creates the file
# automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultDiscordBridge.ini
