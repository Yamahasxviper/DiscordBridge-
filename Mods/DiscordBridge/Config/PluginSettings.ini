[StageSettings]
+AdditionalNonUSFDirectories=Config
+AdditionalNonUSFDirectories=Docs
# DefaultDiscordBridge.ini is user-editable runtime configuration (contains
# server credentials).  Excluding it from the package prevents mod updates from
# overwriting a server operator's configured file.  The mod creates the file
# automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultDiscordBridge.ini
# DefaultBanBridge.ini contains user-specific Discord role/channel IDs.
# Excluding it prevents mod updates from overwriting a configured file.
# The mod creates the file automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultBanBridge.ini
# DefaultTickets.ini contains user-specific ticket channel/role IDs.
# Excluding it prevents mod updates from overwriting a configured file.
# The mod creates the file automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultTickets.ini
# DefaultWhitelist.ini contains user-specific whitelist settings and role/channel IDs.
# Excluding it prevents mod updates from overwriting a configured file.
# The mod creates the file automatically on first server start if it does not exist.
+ExcludedNonUSFFiles=Config/DefaultWhitelist.ini
