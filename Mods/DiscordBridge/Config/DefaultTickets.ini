[TicketSystem]
# TicketSystem - Configuration
# =============================
# This file controls the standalone TicketSystem mod, which adds a button-based
# Discord support-ticket panel.
#
# Note: the mod automatically saves a backup of these settings on every server
#   start: <ServerRoot>/FactoryGame/Saved/TicketSystem/TicketSystem.ini
#   Settings are restored automatically after a mod update resets this file.
# To apply changes: restart the server (or delete this file to regenerate it).

# -- STANDALONE MODE (no DiscordBridge required) ------------------------------

# Set BotToken to run TicketSystem with its own dedicated Discord bot.
# TicketSystem will connect directly to the Discord Gateway and handle all
# ticket interactions without requiring the DiscordBridge mod.

# -- PAIRED MODE (DiscordBridge installed alongside TicketSystem) -------------

# Leave BotToken empty.  DiscordBridge will inject itself as the provider and
# power the ticket panel through its own bot connection.
# Both mods can coexist; DiscordBridge always takes priority when present.

# -- HOW THE TICKET SYSTEM WORKS ----------------------------------------------

#  1. An admin runs /ticket panel in any channel where they hold the
#     TicketNotifyRoleId role.
#  2. The bot posts the button panel to the TicketPanelChannelId channel.
#  3. A member clicks a button (built-in or custom reason).
#     A reason modal (popup form) appears first so the member can describe their
#     request before the ticket is created.
#  4. The bot creates a private ticket channel visible only to that member and
#     the role set in TicketNotifyRoleId (which also receives an @mention ping).
#  5. Admins review and act on the ticket directly inside that channel.
#  6. Either side clicks "Close Ticket" to delete the channel when done.

# -- TICKET TYPES -------------------------------------------------------------

#  Built-in:
#    whitelist - member requests to be added to the server whitelist
#    help      - member submits a general help or support question
#    report    - member reports another player to the admins
#    appeal    - member appeals a ban issued on this server
#
#  Custom:
#    Add as many TicketReason=Label|Description lines as you need (see below).
#
#  Each built-in type can be individually enabled or disabled (see
#  TicketWhitelistEnabled, TicketHelpEnabled, TicketReportEnabled below).

# -- QUICK SETUP (standalone mode) --------------------------------------------

#  1. Go to https://discord.com/developers/applications and create a new bot.
#  2. Under Bot -> Token, copy the token and set BotToken= below.
#  3. Enable "Server Members Intent" and "Message Content Intent" under
#     Bot -> Privileged Gateway Intents in the Developer Portal.
#  4. Invite the bot to your server with permissions:
#       Manage Channels, View Channel, Send Messages
#  5. Create a dedicated, read-only "open-a-ticket" channel in Discord.
#  6. Set TicketPanelChannelId to that channel's ID.
#  7. Create a private admin channel and set TicketChannelId to it (optional).
#  8. Set TicketNotifyRoleId to your admin/support role ID.
#  9. (Optional) Add custom ticket reasons using TicketReason=Label|Description.
# 10. Restart the server.
# 11. Run /ticket panel in any channel where you hold the TicketNotifyRoleId.
# 12. Members click a button; the bot creates a private channel for each ticket.

# -- STANDALONE DISCORD BOT (leave empty when using DiscordBridge) ------------

BotToken=
# Your Discord bot token. Required for standalone mode (without DiscordBridge).
# Create a bot at https://discord.com/developers/applications, navigate to
# Bot -> Token, and paste the token here.
#
# SECURITY: Keep this value private. Anyone with this token can control your bot.
# Do NOT share your server config files publicly.
#
# Leave empty when DiscordBridge is installed - DiscordBridge will inject its
# own bot connection automatically and this value will be ignored.

GuildId=
# Optional Discord guild (server) ID. Leave empty to auto-detect (recommended).
# Set only if the bot does not receive guild info from READY — very unusual.
# How to get: enable Developer Mode, right-click your server icon -> Copy Server ID.

# -- TICKET CHANNEL -----------------------------------------------------------

TicketChannelId=
# Discord channel ID where submitted ticket notifications are posted for admin review.
# Multiple channels (comma-separated): TicketChannelId=345678901234567890,678901234567890123
# Leave empty — the ticket channel itself serves as the notification.
# How to get: Developer Mode -> right-click the channel -> Copy Channel ID.

# -- TICKET LOG / TRANSCRIPT CHANNEL ------------------------------------------

TicketLogChannelId=
# Discord channel ID where a transcript of each closed ticket is posted.
# Includes the ticket opener, date closed, and all messages in chronological order.
# Recommended: a private #ticket-logs channel visible only to admins.
# Leave empty (default) to disable transcript archiving.

# -- TICKET TYPE TOGGLES ------------------------------------------------------

TicketWhitelistEnabled=True
# Whether the Whitelist Request button is shown on the ticket panel. Default: True.

TicketHelpEnabled=True
# Whether the Help / Support button is shown on the ticket panel. Default: True.

TicketReportEnabled=True
# Whether the Report a Player button is shown on the ticket panel. Default: True.

BanAppealEnabled=True
# Whether the Ban Appeal button is shown on the ticket panel. Default: True.

MuteAppealEnabled=True
# Whether the Mute Appeal button is shown on the ticket panel. Default: True.

# -- ADMIN NOTIFICATIONS ------------------------------------------------------

TicketNotifyRoleId=
# Discord role ID to @mention in every ticket notification AND inside every new ticket channel.
# Members of this role can see and respond to tickets.
# Members holding this role can also run /ticket panel to post the panel.
# IMPORTANT: Required for the button-based ticket panel to work correctly.
# How to get: Developer Mode -> Server Settings -> Roles -> right-click -> Copy Role ID.

# -- BUTTON-BASED TICKET PANEL ------------------------------------------------

TicketPanelChannelId=
# Discord channel ID where the bot posts the ticket selection panel (clickable buttons).
# Members click a button; a private channel is then created automatically for each ticket.
# WORKFLOW:
#  1. Create a read-only "open-a-ticket" channel (members can read, not write).
#  2. Set this to that channel's ID.
#  3. Set TicketNotifyRoleId to your admin/support role.
#  4. Run /ticket panel in any channel.
# Required bot permissions: Manage Channels, View Channel, Send Messages.

TicketCategoryId=
# Optional Discord category ID to place created ticket channels under.
# Leave empty to create ticket channels without a category.
# How to get: Developer Mode -> right-click the category -> Copy Channel ID.

# -- PER-TYPE CATEGORY IDS (optional overrides) -------------------------------

# Override the category for specific ticket types. Leave empty to use TicketCategoryId.
WhitelistCategoryId=
HelpCategoryId=
ReportCategoryId=
AppealCategoryId=

MuteAppealCategoryId=
# Optional category ID for mute appeal ticket channels. Falls back to TicketCategoryId.

# -- CUSTOM TICKET REASONS ----------------------------------------------------

# Add your own ticket reason buttons to the panel.  Each line creates one
# additional button.  The format is:
#
#   TicketReason=Label|Description
#
#   Label       - Text shown on the Discord button (keep short, 80 chars max).
#   Description - Brief summary line shown in the panel message body.
#                 Also displayed as the opening context inside the ticket channel.
#
# You can add as many TicketReason= lines as you need.  Discord allows at most
# 25 buttons per message (5 rows x 5 buttons), so the combined count of enabled
# built-in types and custom reasons must not exceed 25.
#
# When a member clicks a custom button:
#  - A private ticket channel named  ticket-<slug>-<username>  is created.
#  - The admin/support role (TicketNotifyRoleId) is @mentioned inside the
#    channel and is granted view/write access.
#  - A welcome message shows the reason label and description.
#  - A "Close Ticket" button is posted so either party can delete the channel.
#
# To remove a custom reason, simply delete (or comment out) its TicketReason=
# line and re-post the panel with /ticket panel.
#
# Examples:
#   TicketReason=Bug Report|Report a bug or technical issue with the server
#   TicketReason=Suggestion|Submit a suggestion or feature request
#   TicketReason=Appeal|Appeal a ban or other moderation action

# -- INACTIVE TICKET AUTO-CLOSE -----------------------------------------------

InactiveTicketTimeoutHours=0
# Hours of inactivity before an open ticket channel is automatically closed.
# Set to 0 (default) to disable automatic closure.
# The check runs every 5 minutes, so closure may be up to 5 minutes late.

# -- TICKET MACROS / CANNED RESPONSES -----------------------------------------

# List of canned response macros that staff can quickly post inside a ticket
# channel using /ticket macro <name>.
# Format: TicketMacro=name|response text
# Add one line per macro.
# Example:
#   TicketMacro=greeting|Hello! Thanks for opening a ticket. How can we help?
#   TicketMacro=closing|This ticket will be closed. Please re-open if you need more help.

# Ban appeal macros -- staff can paste these quickly while reviewing an appeal.
TicketMacro=appeal_pending|:hourglass: Your appeal has been received and is under review. We will respond as soon as possible. Please be patient.
TicketMacro=appeal_more_info|:information_source: We need more information to process your appeal. Please provide your **in-game name**, your **EOS Player UID**, and a detailed explanation of why the ban should be lifted.
TicketMacro=appeal_cheating|:no_entry: After reviewing the evidence, your ban for **cheating / exploiting** has been upheld. This decision is final.
TicketMacro=appeal_griefing|:no_entry: After reviewing the evidence, your ban for **griefing** has been upheld. Our server has a zero-tolerance policy for intentional destruction of other players' work.
TicketMacro=appeal_harassment|:no_entry: After reviewing the evidence, your ban for **harassment / toxic behaviour** has been upheld. All players are expected to treat each other with respect.
TicketMacro=appeal_approved|:white_check_mark: Your ban appeal has been **approved**. You are now free to rejoin the server. Please review our server rules before doing so.

# General support macros
TicketMacro=greeting|:wave: Hello! Thanks for opening a ticket. How can we help you today?
TicketMacro=closing|:envelope: This ticket will now be closed. If you need further assistance, please open a new ticket.

# -- TICKET TEMPLATES (multi-field modals) ------------------------------------

# Multi-field ticket templates that replace the default single-field reason
# modal with a custom form containing multiple text fields. When a template
# matches the ticket type slug, the modal shows the specified fields.
# Format: TicketTemplate=TypeSlug|Field1Label|Field2Label|...
# Add one line per template (up to 5 fields per template, Discord modal limit).
# Example:
#   TicketTemplate=report|Player Name|What happened|Evidence link
#   TicketTemplate=whitelist|In-Game Name|How did you find us

# -- PER-TYPE AUTO-RESPONSES --------------------------------------------------

# Bot message posted automatically to a new ticket channel once created.
# Use this to give immediate guidance to the ticket opener based on ticket type.
# Format: TicketAutoResponse=TypeSlug|Auto-response message text
# Add one line per auto-response.
# Example:
#   TicketAutoResponse=whitelist|Please provide your in-game name and how you found the server.
#   TicketAutoResponse=report|Please include the player name, what happened, and any evidence.

# -- ADVANCED OPTIONS ---------------------------------------------------------

TicketFeedbackEnabled=False
# When True, a DM with a star-rating request is sent to the opener when a ticket is closed.
# Default: False.

TicketCooldownMinutes=0
# Cooldown in minutes a user must wait after closing a ticket before opening another.
# Set to 0 to disable (default).

TicketReopenGracePeriodMinutes=0
# Grace period in minutes after a ticket is closed during which the opener can reopen it.
# Set to 0 to disable (immediate delete after close). Default: 0.

AllowMultipleTicketTypes=False
# When True, users may have one ticket open per type rather than one total. Default: False.

AutoRefreshPanel=False
# When True, the bot deletes and re-posts the ticket panel embed on every server startup.
# Default: False.

DmOpenerOnStaffReply=False
# When True, the bot DMs the ticket opener when a staff member replies in their ticket.
# Default: False.

TicketSlaWarningMinutes=0
# Post a warning to TicketChannelId if no staff has replied within this many minutes.
# Set to 0 to disable (default).

TicketEscalationRoleId=
# Discord role ID to @mention when a ticket is escalated via /ticket escalate.
# Leave empty to disable escalation.

TicketEscalationCategoryId=
# Discord category ID to move escalated ticket channels to.
# Leave empty to keep escalated tickets in their original category.

# -- BAN APPEAL RATE-LIMITING -------------------------------------------------

BanAppealCooldownDays=0
# Days a player must wait after a denied ban appeal before submitting another.
# Set to 0 (default) to disable the cooldown.

MaxLifetimeAppeals=0
# Maximum number of lifetime denied ban appeals a player may submit.
# Set to 0 (default) to disable the limit.
