[Whitelist]
# DiscordBridge - Whitelist Settings
# ==================================
# All whitelist settings are configured here. Edit this file, then restart
# the server for changes to take effect.
# Note: this file is NOT overwritten by mod updates, so your settings persist
#   across version upgrades. A backup is still written automatically to
#   <ServerRoot>/FactoryGame/Saved/DiscordBridge/Whitelist.ini
#   on every server start so settings survive primary file deletion.
# To apply changes: restart the server (or delete this file to regenerate it).

# -- SETTINGS -----------------------------------------------------------------

WhitelistEnabled=False
# Whether the whitelist is active on every server start.
# Default: False (all players can join).

WhitelistCommandRoleId=
# Snowflake ID of the Discord role whose members may run /whitelist commands.
# Leave empty to disable /whitelist commands for all Discord users.
# How to get: Discord Settings > Advanced > Developer Mode,
# then right-click the role in Server Settings > Roles > Copy Role ID.

WhitelistRoleId=
# Snowflake ID of the Discord role assigned to whitelisted members.
# Leave empty to disable Discord role integration.

WhitelistChannelId=
# Snowflake ID of a dedicated Discord channel for whitelisted members.
# Leave empty to disable the whitelist-only channel.

WhitelistKickDiscordMessage=:boot: **%PlayerName%** tried to join but is not on the whitelist and was kicked.
# Message posted to Discord when a non-whitelisted player is kicked.
# Leave empty to disable this notification.
# Placeholder: %PlayerName% = in-game name of the kicked player.

WhitelistKickReason=You are not on the server whitelist. Contact the server admin to be added.
# Reason shown in-game to the player when kicked for not being whitelisted.

WhitelistEventsChannelId=
# Snowflake ID of a Discord channel where whitelist events (add/remove/enable/disable)
# are posted as embeds. Leave empty to disable whitelist event notifications.

MaxWhitelistSlots=0
# Maximum number of whitelist slots. 0 = unlimited.

SyncWhitelistWithRole=False
# When True, auto-add/remove players based on Discord WhitelistRoleId membership.

WhitelistApplicationChannelId=
# Channel where whitelist application embeds (Approve/Deny) are posted.
# Leave empty to disable the application flow.

WhitelistApplyEnabled=False
# When True, any Discord user can run /whitelist apply <InGameName>. Default: False.

WhitelistApprovedDmMessage=
# DM sent to user when approved. %PlayerName% placeholder. Leave empty to disable.

WhitelistExpiryWarningHours=24
# Hours before expiry to post a warning embed. 0 = disabled. Default: 24.

WhitelistVerificationEnabled=False
# When True, enables /whitelist link / in-game /verify account linking. Default: False.

WhitelistVerificationChannelId=
# Channel where /whitelist link commands are accepted. Empty = any channel.
