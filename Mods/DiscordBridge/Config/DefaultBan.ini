[DiscordBridge]
; ==============================================================================
; DiscordBridge - Ban System Configuration
; ==============================================================================
;
; This file controls the built-in player ban system for the DiscordBridge mod.
; Edit this file to configure how banned players are identified and handled.
;
; BACKUP
; -------
;  The mod automatically saves a backup of these settings on every server start:
;    <ServerRoot>/FactoryGame/Saved/Config/Ban.ini
;  Settings are restored automatically after a mod update resets this file.
;
; BAN DATA FILE
; --------------
;  Banned player names and platform IDs are stored in:
;    <ServerRoot>/FactoryGame/Saved/ServerBanlist.json
;  This file is managed automatically by the !ban add / !ban remove commands.
;  Do not edit it manually while the server is running.
;
; BAN SYSTEM vs WHITELIST
; ------------------------
;  The ban system and the whitelist are completely independent of each other.
;  You can use either one, both, or neither:
;
;    Ban only:        WhitelistEnabled=False (DefaultWhitelist.ini), BanSystemEnabled=True
;    Whitelist only:  WhitelistEnabled=True  (DefaultWhitelist.ini), BanSystemEnabled=False
;    Both active:     WhitelistEnabled=True,  BanSystemEnabled=True
;    Neither active:  WhitelistEnabled=False, BanSystemEnabled=False
;
;  When BOTH are active, a player is kicked if they fail EITHER check (they
;  must be whitelisted AND not banned to join).
;
; NAME-BASED vs PLATFORM ID BANNING
; -----------------------------------
;  Name-based banning (!ban add <name>) bans the player's current in-game name.
;  Platform ID banning (!ban id add <id>) bans by Steam64 ID or EOS Product
;  User ID. Platform IDs are persistent - players cannot evade them by renaming.
;  Use platform ID banning for reliable, evasion-proof bans.
;  Player platform IDs appear in the server log when a player joins or is kicked.
;
; QUICK SETUP
; ------------
;  1. BanSystemEnabled=True is the default; bans are enforced automatically.
;  2. Set BanCommandRoleId to a Discord role ID so admins can manage bans.
;  3. Restart the server.
;  4. Use !ban add <player_name> or !ban id add <platform_id> in Discord
;     to ban players.
;
; ==============================================================================

; ------------------------------------------------------------------------------
; BAN SYSTEM ON/OFF
; ------------------------------------------------------------------------------

; Whether the ban system is enforced when the server starts.
; When True (default), players listed in ServerBanlist.json are kicked
; immediately when they attempt to join.
; When False, the ban list is not checked and banned players can join freely.
; Existing ban list entries are preserved when False; the check is simply skipped.
;
; NOTE: This value is re-applied on EVERY server restart and is the authoritative
; toggle. The !ban on / !ban off Discord commands change the in-memory state for
; the current session only; they do NOT persist across restarts.
; Default: True
BanSystemEnabled=True

; ------------------------------------------------------------------------------
; DISCORD COMMAND ROLE (who can manage bans from Discord)
; ------------------------------------------------------------------------------

; Discord role ID whose members are permitted to run !ban commands
; in the bridged Discord channel.
; When set, ONLY members of this role can use !ban management commands.
; When left empty (the default), ALL !ban commands are disabled for every
; Discord user until a role ID is provided here (deny-by-default).
;
; This role is also the one granted or revoked by the
; !ban role add <discord_id> and !ban role remove <discord_id> commands,
; allowing existing role holders to promote or demote other Discord members
; from within Discord (the bot must have the Manage Roles permission).
;
; IMPORTANT: Holding this role grants the ability to ban or unban players, but
; does NOT automatically grant access to the game server. Role holders are still
; subject to normal whitelist and ban checks when joining.
;
; How to get the role ID: Discord Settings -> Advanced -> Developer Mode, then
; right-click the role in Server Settings -> Roles -> Copy Role ID.
; Example: BanCommandRoleId=987654321098765432
BanCommandRoleId=

; ------------------------------------------------------------------------------
; DISCORD BAN COMMANDS
; ------------------------------------------------------------------------------

; Prefix used to trigger ban management commands in the bridged Discord channel.
; Set to an empty string to disable all Discord-based ban management.
;
; Available commands (replace !ban with your chosen prefix):
;
;   NAME-BASED BANNING
;   !ban add <player_name>           - ban a player by their current in-game name
;                                      (also auto-bans their platform ID if connected)
;   !ban remove <player_name>        - unban a player by their in-game name
;   !ban list                        - list all banned player names
;   !ban check <player_name>         - check if a player is banned (by name or ID)
;
;   GENERIC PLATFORM ID BANNING (Steam64 or EOS PUID)
;   !ban id lookup <player_name>     - look up the platform ID of a connected player
;   !ban id add <platform_id>        - ban by Steam64 ID or EOS PUID (auto-detects type)
;   !ban id remove <platform_id>     - unban by Steam64 ID or EOS PUID
;   !ban id list                     - list all banned platform IDs with type labels
;
;   STEAM-SPECIFIC BANNING (DefaultPlatformService=Steam servers)
;   !ban steam add <steam64_id>      - ban a Steam player by their Steam64 ID
;                                      (17-digit number starting with 765,
;                                       e.g. 76561198123456789)
;                                      Validates the format before adding.
;   !ban steam remove <steam64_id>   - unban by Steam64 ID
;   !ban steam list                  - list only banned Steam64 IDs
;
;   EOS/EPIC BANNING (DefaultPlatformService=EOS servers — covers both Steam and Epic)
;   !ban epic add <eos_puid>         - ban by EOS Product User ID
;                                      (hex string, e.g. 0002abcdef1234567890abcdef123456)
;                                      Works for both Steam and Epic accounts on EOS servers.
;                                      Use !ban id lookup or !ban players to find PUIDs.
;   !ban epic remove <eos_puid>      - unban by EOS PUID
;   !ban epic list                   - list only banned EOS PUIDs
;
;   STATUS & MANAGEMENT
;   !ban players                     - list ALL connected players with their
;                                      platform (Steam/Epic) and EOS Product User ID
;                                      in one shot — the quickest way to find a
;                                      griefer's ID for a platform-ID ban
;   !ban status                      - show whether the ban system, whitelist, and
;                                      EOS platform are currently enabled or disabled
;   !ban on                          - enable the ban system for this session
;   !ban off                         - disable the ban system for this session
;   !ban role add <discord_id>       - grant the BanCommandRoleId Discord role to
;                                      a Discord user by their user ID
;                                      (bot needs Manage Roles permission)
;   !ban role remove <discord_id>    - revoke the BanCommandRoleId Discord role from
;                                      a Discord user by their user ID
;
; WHICH ID TYPE TO USE?
; ---------------------
; The correct platform ID type depends on how your server is configured:
;
;   DefaultPlatformService=Steam  (in DefaultEngine.ini)
;     → Players connect with their Steam64 ID.
;     → Use !ban steam add <steam64_id>  (17-digit number, e.g. 76561198123456789)
;     → Their Steam64 ID is shown by !ban players and in the server log.
;
;   DefaultPlatformService=EOS  (in DefaultEngine.ini)
;     → Both Steam and Epic players receive an EOS Product User ID (PUID).
;     → Use !ban epic add <eos_puid>  or  !ban id add <eos_puid>
;     → Their PUID is shown by !ban players  or  !ban id lookup <name>.
;
; When in doubt, use !ban add <name> first (auto-bans by platform ID if connected)
; or check !ban players to see what format of ID your players have.
;
; TYPICAL WORKFLOW for banning a griefer by platform ID:
;   1. !ban players          — see who is online and their platform IDs
;   2. !ban id add <id>      — ban that ID (works even if they rename)
;      OR: !ban steam add <steam64>  /  !ban epic add <puid>  for validated input
;   3. !ban check <name>     — verify the ban is in place
;
; TIP: Prefer platform ID banning over name banning for griefers who may rename
; themselves to evade a name-based ban. Find a player's platform ID with
; !ban players or !ban id lookup <name>.
;
; Default: !ban
; Example (custom prefix): BanCommandPrefix=!block
BanCommandPrefix=!ban

; Discord channel ID of a dedicated channel for ban management.
; When set, !ban commands are accepted in this channel in addition to the main
; bridged channel. Ban notifications are also posted here.
; Leave empty to handle all bans through the main bridged channel only.
;
; Multiple channels (comma-separated):
;   BanChannelId=567890123456789012,112233445566778899
;
; How to get the channel ID: right-click the channel in Discord with Developer
; Mode enabled -> Copy Channel ID.
; Example: BanChannelId=567890123456789012
BanChannelId=

; Whether the !ban Discord and in-game command interface is active.
; When True (default), !ban commands are accepted and processed (still gated by
; BanCommandRoleId, so only role members can use them).
; When False, ALL !ban commands are silently ignored; however existing bans in
; ServerBanlist.json are STILL enforced on join because BanSystemEnabled is
; unaffected by this setting.
; Use this to temporarily lock down the ban command interface without disabling
; ban enforcement or deleting the ban list.
; Default: True
BanCommandsEnabled=True

; ------------------------------------------------------------------------------
; KICK MESSAGES
; ------------------------------------------------------------------------------

; Message posted to the main bridged Discord channel whenever a banned player
; tries to join the server and is kicked.
; Available placeholder:
;   %PlayerName%  - the in-game name of the banned player who was denied
; Leave empty (delete everything after the =) to disable this notification.
; Default: :hammer: **%PlayerName%** is banned from this server and was kicked.
; Example: BanKickDiscordMessage=:no_entry: **%PlayerName%** is banned and was removed.
BanKickDiscordMessage=:hammer: **%PlayerName%** is banned from this server and was kicked.

; Text displayed to the player in the Satisfactory disconnected/kicked screen
; when they are kicked because they are on the ban list.
; Keep this message clear so the player understands why they were removed.
; Leave empty to use the built-in default message.
; Default: You are banned from this server.
; Example: BanKickReason=You have been banned from this server. Contact an admin to appeal.
BanKickReason=

; ------------------------------------------------------------------------------
; PERIODIC BAN SCAN
; ------------------------------------------------------------------------------

; How often (in seconds) the server scans all connected players against the
; ban list and kicks any who are found to be banned.
;
; This acts as a safety net for bans that are added directly to
; ServerBanlist.json without going through the Discord or in-game bot commands
; (bot commands already kick the player immediately when a ban is issued).
;
; Set to 0 to disable the periodic scan entirely.
; When enabled, the interval is enforced to a minimum of 30 seconds.
; Default: 300 (5 minutes)
;
; Example: BanScanIntervalSeconds=60
BanScanIntervalSeconds=300

; ------------------------------------------------------------------------------
; IN-GAME BAN COMMANDS
; ------------------------------------------------------------------------------

; Prefix used to trigger ban management commands typed in the Satisfactory
; in-game chat. Set to an empty string to disable in-game ban management.
;
; Available in-game commands (replace !ban with your chosen prefix):
;
;   NAME-BASED BANNING
;   !ban add <player_name>           - ban a player by in-game name
;   !ban remove <player_name>        - unban a player by in-game name
;   !ban list                        - list all banned player names
;   !ban check <player_name>         - check if a player is banned by name or ID
;
;   GENERIC PLATFORM ID BANNING
;   !ban id lookup <player_name>     - look up the platform ID of a connected player
;   !ban id add <platform_id>        - ban by Steam64 ID or EOS PUID (auto-detects type)
;   !ban id remove <platform_id>     - unban by Steam64 ID or EOS PUID
;   !ban id list                     - list all banned platform IDs with type labels
;
;   STEAM-SPECIFIC BANNING
;   !ban steam add <steam64_id>      - ban a Steam player by Steam64 ID (17-digit, starts with 765)
;   !ban steam remove <steam64_id>   - unban by Steam64 ID
;   !ban steam list                  - list only banned Steam64 IDs
;
;   EOS/EPIC BANNING (covers both Steam and Epic on EOS servers)
;   !ban epic add <eos_puid>         - ban by EOS Product User ID (hex string)
;   !ban epic remove <eos_puid>      - unban by EOS PUID
;   !ban epic list                   - list only banned EOS PUIDs
;
;   STATUS & MANAGEMENT
;   !ban players                     - list all connected players with platform and ID
;   !ban status                      - show current ban system and whitelist state
;   !ban on                          - enable the ban system for this session
;   !ban off                         - disable the ban system for this session
;
; Note: in-game commands do NOT support Discord role management
; (!ban role add / !ban role remove). Use Discord for those.
;
; Default: !ban
; Example (custom prefix): InGameBanCommandPrefix=!block
InGameBanCommandPrefix=!ban

; ==============================================================================
; KICK COMMAND
; ==============================================================================
;
; The kick command kicks a player from the server WITHOUT permanently banning
; them. The player can reconnect immediately after being kicked. Use it for
; temporary disciplinary actions when you do not want to add the player to the
; permanent ban list.
;
; Kick commands are independent of the ban system toggle — !kick works even
; when BanSystemEnabled=False.
;
; QUICK SETUP
; ------------
;  1. Set KickCommandRoleId to a Discord role ID so admins can kick players.
;  2. Optionally customise KickCommandPrefix (default: !kick) and KickReason.
;  3. Restart the server.
;  4. Use !kick <player_name> in Discord to kick a player.
;  5. Optionally use !kick <player_name> <reason> to include a custom reason.
;
; ==============================================================================

; ------------------------------------------------------------------------------
; KICK COMMAND ROLE (who can kick players from Discord)
; ------------------------------------------------------------------------------

; Discord role ID whose members are permitted to run !kick commands.
; When set, ONLY members of this role can use !kick commands.
; When left empty (the default), ALL !kick commands are disabled for every
; Discord user until a role ID is provided here (deny-by-default).
;
; This can be the same role as BanCommandRoleId if you want the same admins
; to have both ban and kick access.
;
; To get the role ID: Discord Settings → Advanced → Developer Mode, then
; right-click the role in Server Settings → Roles → Copy Role ID.
; Example: KickCommandRoleId=123456789012345678
KickCommandRoleId=

; ------------------------------------------------------------------------------
; KICK COMMAND SETTINGS
; ------------------------------------------------------------------------------

; Prefix that triggers the kick command from Discord.
; Usage: !kick <PlayerName>
;        !kick <PlayerName> <reason>
; Set to an empty string to disable Discord-based kicking.
; Default: !kick
KickCommandPrefix=!kick

; Master on/off switch for kick commands.
; When True (default), !kick commands are enabled for members holding KickCommandRoleId.
; When False, all !kick commands are silently ignored.
; Default: True
KickCommandsEnabled=True

; Message posted to the Discord channel when a player is kicked via !kick.
; Leave empty to disable the notification.
; Available placeholders:
;   %PlayerName%  – in-game name of the kicked player.
;   %Reason%      – the kick reason (from the command or the default KickReason).
; Default: :boot: **%PlayerName%** was kicked by an admin.
; Examples:
;   KickDiscordMessage=:boot: **%PlayerName%** was kicked. Reason: %Reason%
;   KickDiscordMessage=:stop_sign: **%PlayerName%** has been removed from the server.
KickDiscordMessage=:boot: **%PlayerName%** was kicked by an admin.

; Default reason shown in-game to a kicked player when no reason is given
; in the !kick command. This is the text the player sees in the Disconnected screen.
; Leave empty to use the built-in default ("You have been kicked from the server by an admin.").
; Examples:
;   KickReason=Please contact an admin for more information.
;   KickReason=Kicked by server admin.
KickReason=

; ------------------------------------------------------------------------------
; IN-GAME KICK COMMAND
; ------------------------------------------------------------------------------
;
; Server admins can also kick players directly from the Satisfactory in-game
; chat without using Discord. The in-game kick command uses KickReason and
; KickDiscordMessage exactly like the Discord version.
;
; Supported commands (type in the Satisfactory in-game chat):
;   !kick <player_name>           - kick a player (default KickReason)
;   !kick <player_name> <reason>  - kick with a custom reason
;
; Default: !kick
; Example (custom prefix): InGameKickCommandPrefix=!remove
InGameKickCommandPrefix=!kick
