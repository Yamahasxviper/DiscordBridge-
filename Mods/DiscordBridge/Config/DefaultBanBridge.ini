; DiscordBridge – BanSystem integration settings
; ─────────────────────────────────────────────────────────────────────────────
; This file configures the Discord ban commands added by DiscordBridge when
; BanSystem is installed alongside it.
;
; Available commands (type in any Discord channel the bot can read):
;
;   !ban <PUID|name> [reason]
;       Permanently ban a player.
;       PUID = 32-character hex EOS Product User ID, or "EOS:<puid>".
;       Name = any substring of the player's in-game name (must be unambiguous).
;
;   !tempban <PUID|name> <minutes> [reason]
;       Temporarily ban a player for the given number of minutes.
;
;   !unban <PUID>
;       Remove an active ban.
;
;   !bancheck <PUID|name>
;       Show the current ban status for a player.
;
;   !banlist [page]
;       List all active bans (10 per page).
;
;   !playerhistory <name|PUID>
;       Show known session records (EOS PUID, display name, last-seen time)
;       for players whose name or PUID matches the given argument.
;
; ─────────────────────────────────────────────────────────────────────────────
; To apply changes: restart the server (or delete this file to regenerate it).
; To preserve settings across DiscordBridge updates, copy this file to:
;   Saved/DiscordBridge/BanBridge.ini
; ─────────────────────────────────────────────────────────────────────────────

[BanBridge]

; Discord role ID whose members may run the ban commands listed above.
; Members must hold this role in your Discord server.
;
; How to get the role ID:
;   1. Enable Developer Mode: User Settings → Advanced → Developer Mode
;   2. Open Server Settings → Roles
;   3. Right-click the admin role and choose "Copy Role ID"
;
; Leave empty to disable all Discord ban commands.
AdminRoleId=

; Optional: restrict ban commands to a single Discord channel.
; When set, the bot ignores ban commands posted in any other channel.
;
; How to get the channel ID:
;   Enable Developer Mode (see above), right-click the channel,
;   and choose "Copy Channel ID".
;
; Leave empty to allow ban commands from any channel the bot can see.
BanCommandChannelId=
