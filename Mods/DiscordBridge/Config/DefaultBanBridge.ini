[BanBridge]
# DiscordBridge - BanSystem Integration
# =======================================
# This file configures the Discord ban/moderation commands added by DiscordBridge
# when BanSystem (and optionally BanChatCommands) is installed alongside it.
#
# Note: this file is NOT overwritten by mod updates. To preserve settings
#   across DiscordBridge updates, copy this file to:
#   Saved/DiscordBridge/BanBridge.ini
# To apply changes: restart the server (or delete this file to regenerate it).

# -- ADMIN COMMANDS (require AdminRoleId) -------------------------------------

#   /ban add <player> [reason]
#       Permanently ban a player.
#       PUID = 32-character hex EOS Product User ID, or "EOS:<puid>".
#       Name = any substring of the player's in-game name (must be unambiguous).
#
#   /ban temp <PUID|name> <minutes> [reason]
#       Temporarily ban a player for the given number of minutes.
#
#   /ban remove <PUID>
#       Remove an active ban by EOS PUID or compound UID.
#
#   /ban removename <name_substring>
#       Remove a ban by in-game display name (looks up the session registry).
#
#   /ban byname <name> [reason]
#       Ban a player by display name, banning both their EOS PUID and IP address.
#
#   /ban check <player>
#       Show the current ban status for a player.
#
#   /ban reason <player> <new_reason>
#       Edit the reason on an existing active ban.
#
#   /ban list [page]
#       List all active bans (10 per page).
#
#   /ban link <UID1> <UID2>
#       Link two compound UIDs so a ban on one also blocks the other identity.
#
#   /ban unlink <UID1> <UID2>
#       Remove the link between two previously linked UIDs.
#
#   /ban extend <PUID|name> <minutes>
#       Extend an active temporary ban by the given number of minutes.
#
#   /ban duration <PUID|name>
#       Show the remaining time on a player's active temporary ban.
#
#   /player history <name|PUID|IP>
#       Show known session records (EOS PUID, display name, IP, last-seen time).
#
#   /warn add <player> <reason>
#       Issue a formal warning (requires BanSystem).
#
#   /warn list <player>
#       List all recorded warnings for a player.
#
#   /warn clearall <PUID|name>
#       Remove all warnings for a player.
#
#   /warn clearone <warning_id>
#       Remove a single warning by its numeric ID (shown in /warn list output).
#
#   /player note <PUID|name> <text...>
#       Add a private admin note to a player record (requires BanChatCommands).
#
#   /player notes <PUID|name>
#       List all private admin notes for a player (requires BanChatCommands).
#
#   /ban reason <UID>
#       Show the ban reason for a compound UID.
#
#   /admin reloadconfig
#       Reload the BanBridge configuration from disk without restarting.
#
#   /admin panel
#       Post an interactive admin panel embed with action buttons directly in
#       the Discord channel (or AdminPanelChannelId if configured).
#       Buttons open modals for input:
#         Kick / Mute / Ban / Temp Ban / Warn / Announce
#       Buttons execute immediately:
#         Players (list online) / Staff (online staff) / Ban List / Reload Config
#       Mod-level buttons (kick, mute, announce, players, staff) require ModeratorRoleId.
#       Admin-level buttons (ban, temp ban, warn, ban list, reload) require AdminRoleId.
#       Permission is enforced at both the button-click and modal-submit stages.

# -- MODERATOR COMMANDS (require ModeratorRoleId or AdminRoleId) --------------

#   /mod kick <player> [reason]
#       Kick a connected player without banning them.
#
#   /mod ban <PUID|name> [reason]
#       Apply a temporary ban using the configurable ModBanDurationMinutes duration.
#
#   /mod mute <player> [minutes] [reason]
#       Mute a player's in-game chat (requires BanChatCommands).
#       minutes = 0 or omitted means indefinite.
#
#   /mod unmute <PUID|name>
#       Remove a mute from a player (requires BanChatCommands).
#
#   /mod tempmute <PUID|name> <minutes>
#       Apply a timed mute that auto-expires after the given minutes (requires BanChatCommands).
#
#   /mod mutecheck <player>
#       Check whether a player is muted and when the mute expires (requires BanChatCommands).
#
#   /mod mutelist
#       List all currently muted players (requires BanChatCommands).
#
#   /mod announce <message>
#       Broadcast a message to all connected in-game players.
#
#   /mod stafflist
#       List the names of currently online admins and moderators.
#
#   /mod staffchat <message>
#       Send a message visible only to online admin/moderator players in-game.

# -- SETTINGS -----------------------------------------------------------------

AdminRoleId=
# Discord role ID whose members may run ALL ban/moderation commands listed above.
# Leave empty to disable all Discord ban commands.
#
# How to get the role ID:
#   1. Enable Developer Mode: User Settings -> Advanced -> Developer Mode
#   2. Open Server Settings -> Roles
#   3. Right-click the admin role and choose "Copy Role ID"

ModeratorRoleId=
# Optional: Discord role ID for moderators with limited command access.
# Moderators may use: /mod kick, /mod modban, /mod mute, /mod unmute, /mod tempmute,
# /mod mutecheck, /mod mutelist, /mod announce, /mod stafflist, /mod staffchat.
# Admins (AdminRoleId) always pass the moderator check automatically.
# Leave empty to restrict those commands to admins only.

BanCommandChannelId=
# Optional: restrict ban commands to a single Discord channel.
# Leave empty to allow ban commands from any channel the bot can see.
#
# How to get the channel ID:
#   Enable Developer Mode (see above), right-click the channel,
#   and choose "Copy Channel ID".

ModerationLogChannelId=
# Optional: Discord channel ID to post a moderation log after every
# ban/unban/kick/mute/warn action. Leave empty to disable logging.

AdminPanelChannelId=
# Optional: Discord channel ID where /admin panel posts the interactive admin
# panel embed. When empty the panel is sent to the channel in which the
# /admin panel command was issued. Set this to restrict the panel to a
# dedicated mod-tools channel.

StaffChatChannelId=
# Optional: Discord channel ID for the bidirectional staff-chat bridge.
# When set:
#   - In-game /staffchat messages are mirrored to this Discord channel.
#   - Regular messages posted to this channel by Discord staff are
#     relayed to all online admin/moderator players in-game.
# Leave empty to disable the staff-chat bridge (default).
